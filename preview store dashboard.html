<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light only">
<title>プレビュー：店舗ダッシュボード（調整版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F6FA;
    --bg-soft:#F0EEF5;
    --surface:#FFFFFF;
    --line:#DEDEDE;
    --ink:#111111;
    --ink-soft:#555555;
    --accent:#FF2C63;
    --accent-2:#6E56CF;
    --accent-soft:#FFDCE5;
    --accent-tint:#FFF7F9;
    --wait-bg:#E8E8E8;
    --wait-ink:#555555;
    --progress:#FF2C63;
    --done:#35A854;
    --done-soft:#E3F6E8;
    --danger:#E5484D;
    --danger-soft:#FDE8E8;
    --shadow-card:0 3px 10px rgba(0,0,0,.03);
    --shadow-hero:0 10px 30px rgba(23,16,30,.08);
    --radius-lg:18px;
    --radius-md:14px;
    --radius-sm:12px;
    --font-display:"Zen Maru Gothic","Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
    --font-body:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);width:100%;color-scheme:light;}
  body{min-height:100vh;padding:24px 0 60px;}
  button{font-family:inherit;cursor:pointer;border:1px solid var(--line);color:var(--ink);background:var(--surface);border-radius:999px;padding:13px 18px;font-size:14.5px;font-weight:700;}
  input{font-family:inherit;font-size:14.5px;background:var(--bg-soft);border:1px solid transparent;color:var(--ink);border-radius:var(--radius-sm);padding:12px 14px;}
  input::placeholder{color:var(--ink-soft);}
  .screen{max-width:480px;margin:0 auto;padding:0 18px;}
  .preview-note{max-width:480px;margin:0 auto 16px;padding:10px 16px;background:#FFF3D6;border:1px solid #F0D48A;border-radius:12px;font-size:12.5px;color:#6b5416;text-align:center;}

  .store-panel{display:flex;flex-direction:column;gap:18px;}
  .store-section{}
  .store-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);padding:20px 18px;}
  .store-header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .store-name{font-family:var(--font-display);font-weight:800;font-size:18px;letter-spacing:-.5px;flex-shrink:0;}
  .store-code-block{flex-shrink:0;}
  .store-code-label{font-size:10.5px;color:var(--ink-soft);margin-bottom:5px;}
  .store-code-box{display:inline-flex;align-items:center;font-family:var(--font-display);font-size:13.5px;font-weight:700;letter-spacing:.04em;background:#F0F0F0;border-radius:9px;padding:8px 12px;}
  .store-header-icons{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;justify-content:flex-end;flex:1 1 auto;min-width:0;}
  .icon-action{display:flex;flex-direction:column;align-items:center;gap:6px;background:none;border:none;padding:2px 3px;color:var(--ink);font-size:11.5px;font-weight:500;white-space:nowrap;}
  .icon-action svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.8;}
  .store-subactions{display:flex;gap:8px;justify-content:flex-end;margin-top:-6px;}
  .sub-action{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:8px 14px 8px 12px;color:var(--ink);font-size:12.5px;font-weight:700;}
  .sub-action svg{width:15px;height:15px;stroke:currentColor;stroke-width:2.2;}
  .store-stats{display:flex;gap:12px;}
  .info-card{flex:1;min-width:0;border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);padding:16px 18px;}
  .info-card-label{font-size:12px;color:var(--ink-soft);font-weight:700;margin-bottom:12px;}
  .info-card-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .info-card-value{font-family:var(--font-display);font-size:24px;font-weight:800;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .info-card-value.free{color:var(--done);}
  .info-card-value.busy{color:var(--accent);}
  .info-card-value.wait{color:var(--accent);}
  .info-card-value .unit{font-size:14px;font-weight:700;margin-left:2px;}
  .info-card-icon{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2.5px solid var(--done);color:var(--done);}
  .info-card-icon svg{width:19px;height:19px;stroke:currentColor;stroke-width:2.3;}
  .info-card.busy .info-card-icon{border-color:var(--accent);color:var(--accent);}
  .info-card.wait .info-card-icon{border:none;color:var(--accent);}
  .info-card-caption{font-size:12px;color:var(--ink-soft);margin-top:9px;}
  .store-form-title{font-family:var(--font-display);font-weight:800;font-size:16px;margin-bottom:12px;}
  .store-form-row{display:flex;gap:10px;}
  .store-form-row input{flex:1 1 auto;min-width:0;font-size:15px;padding:14px 15px;border:1px solid var(--line);border-radius:12px;background:var(--surface);}
  .store-form-row .submit{flex-shrink:0;background:var(--accent);border-color:var(--accent);color:#fff;font-weight:800;font-size:15px;padding:14px 24px;border-radius:12px;}
  .store-list-head{display:flex;align-items:center;justify-content:space-between;}
  .store-list-title{font-family:var(--font-display);font-weight:800;font-size:15px;}
  .store-updated{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft);}
  .store-updated svg{width:15px;height:15px;stroke:currentColor;}
  .progress-tag{font-size:13px;font-weight:800;color:var(--accent);margin:14px 0 10px;}
  .progress-card{display:flex;align-items:center;gap:10px;background:var(--accent-tint);border:1px solid #F2CCD6;border-radius:var(--radius-md);padding:14px 16px;margin-bottom:10px;}
  .progress-name{font-size:15px;font-weight:800;}
  .progress-staff{font-size:12px;color:var(--ink-soft);margin-top:4px;}
  .progress-elapsed{flex:1;text-align:center;border-left:1px solid var(--line);padding-left:10px;}
  .progress-elapsed-label{font-size:10.5px;color:var(--ink-soft);}
  .progress-elapsed-value{font-family:var(--font-display);font-size:17px;font-weight:800;color:var(--accent);margin-top:3px;}
  .progress-badge{flex-shrink:0;font-size:11px;font-weight:800;color:var(--accent);background:var(--accent-soft);padding:8px 14px;border-radius:11px;}
  .wait-section-title{font-size:14px;font-weight:800;margin:6px 0 10px;}
  .wait-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);}
  .wait-row:last-child{border-bottom:none;}
  .wait-pos{width:28px;height:28px;border-radius:50%;background:var(--wait-bg);color:var(--ink);font-weight:800;font-size:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .wait-name{font-size:16px;font-weight:800;flex:1;min-width:0;}
  .wait-eta{text-align:center;flex-shrink:0;border-left:1px solid var(--line);padding-left:10px;}
  .wait-eta-label{font-size:10.5px;color:var(--ink-soft);}
  .wait-eta-value{font-size:15px;font-weight:800;color:var(--accent);margin-top:3px;}
  .wait-actions{display:flex;gap:8px;flex-shrink:0;}
  .wait-actions button{width:42px;height:42px;padding:0;border-radius:12px;background:var(--surface);border:1.5px solid var(--ink);color:var(--ink);display:flex;align-items:center;justify-content:center;}
  .wait-actions button svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.4;}
  .store-done-log{margin-top:18px;padding-top:16px;border-top:1px solid var(--line);}
  .store-done-log summary{list-style:none;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-weight:800;font-size:15px;font-family:var(--font-display);}
  .store-done-log summary::-webkit-details-marker{display:none;}
  .store-done-log summary svg{width:18px;height:18px;stroke:currentColor;}
  .empty-hint{font-size:13px;color:var(--ink-soft);padding:8px 0;}
</style>
</head>
<body>

<div class="preview-note">これは調整後デザインの確認用プレビューです（実データとは連動していません）</div>

<div class="screen">
  <div class="store-panel">
    <div class="store-section store-header">
      <div class="store-name">渋谷店</div>
      <div class="store-code-block">
        <div class="store-code-label">セッションコード</div>
        <div class="store-code-box">ABCD1234</div>
      </div>
      <div class="store-header-icons">
        <button class="icon-action" title="ヘアメ登録"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg><span>ヘアメ登録</span></button>
        <button class="icon-action" title="QR表示"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><line x1="14" y1="16" x2="14" y2="21"/><line x1="21" y1="14" x2="21" y2="21"/><line x1="14" y1="21" x2="21" y2="21"/><line x1="18" y1="14" x2="18" y2="17"/></svg><span>QR表示</span></button>
        <button class="icon-action reset" title="解除"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>解除</span></button>
      </div>
    </div>

    <div class="store-section store-subactions">
      <button class="sub-action" title="ヘアメ開始"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg><span>ヘアメ開始</span></button>
      <button class="sub-action" title="対応履歴"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/></svg><span>対応履歴</span></button>
    </div>

    <div class="store-section store-stats">
      <div class="info-card free">
        <div class="info-card-label">ヘアメ状況</div>
        <div class="info-card-row">
          <div class="info-card-value free">空き</div>
          <div class="info-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg></div>
        </div>
        <div class="info-card-caption">受付可能です</div>
      </div>
      <div class="info-card wait">
        <div class="info-card-label">待機人数</div>
        <div class="info-card-row">
          <div class="info-card-value wait">3<span class="unit">人</span></div>
          <div class="info-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
        </div>
        <div class="info-card-caption">待機中のキャスト</div>
      </div>
    </div>

    <div class="store-section store-card">
      <div class="store-form-title">キャスト追加</div>
      <div class="store-form-row">
        <input placeholder="キャスト名を入力">
        <button class="submit">追加</button>
      </div>
    </div>

    <div class="store-section store-card">
      <div class="store-list-head">
        <div class="store-list-title">一覧</div>
        <div class="store-updated">更新：10:30 <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></div>
      </div>

      <div class="progress-tag">施術中</div>
      <div class="progress-card">
        <div>
          <div class="progress-name">はら</div>
          <div class="progress-staff">担当：山田</div>
        </div>
        <div class="progress-elapsed">
          <div class="progress-elapsed-label">経過時間</div>
          <div class="progress-elapsed-value">08:35</div>
        </div>
        <div class="progress-badge">施術中</div>
      </div>

      <div class="wait-section-title">待機中</div>

      <div class="wait-row">
        <div class="wait-pos">1</div>
        <div class="wait-name">かな</div>
        <div class="wait-eta"><div class="wait-eta-label">予想待ち</div><div class="wait-eta-value">約7分</div></div>
        <div class="wait-actions">
          <button title="上へ"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="6 11 12 5 18 11"/></svg></button>
          <button title="下へ"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="18 13 12 19 6 13"/></svg></button>
          <button title="キャンセル"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
      </div>
      <div class="wait-row">
        <div class="wait-pos">2</div>
        <div class="wait-name">あい</div>
        <div class="wait-eta"><div class="wait-eta-label">予想待ち</div><div class="wait-eta-value">約22分</div></div>
        <div class="wait-actions">
          <button title="上へ"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="6 11 12 5 18 11"/></svg></button>
          <button title="下へ"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="18 13 12 19 6 13"/></svg></button>
          <button title="キャンセル"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
      </div>
      <div class="wait-row">
        <div class="wait-pos">3</div>
        <div class="wait-name">ゆい</div>
        <div class="wait-eta"><div class="wait-eta-label">予想待ち</div><div class="wait-eta-value">約38分</div></div>
        <div class="wait-actions">
          <button title="上へ"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="6 11 12 5 18 11"/></svg></button>
          <button title="下へ"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="18 13 12 19 6 13"/></svg></button>
          <button title="キャンセル"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
      </div>
    </div>

    <div class="store-section store-card">
      <details class="store-done-log">
        <summary><span>完了履歴（0件）</span><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></summary>
        <div class="empty-hint">まだありません</div>
      </details>
    </div>
  </div>
</div>

</body>
</html>
