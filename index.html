<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ヘアメ待ち管理</title>

<!--
  ============================================================
  デプロイ手順（mto-shizuokaと同様の構成を想定）
  1) このアプリ専用のFirebaseプロジェクトを新規作成
     （既存のmto-shizuokaと混在させない場合は新規推奨。同一プロジェクトに
      別コレクション名で同居させる場合はfirebaseConfigを既存のものに差し替えでも可）
  2) Firestore を作成（本番モード）
  3) 下記 firebaseConfig に値を入力
  4) Firestoreルール例（sessionコードを知っている端末のみ読み書き可・簡易版）
     rules_version = '2';
     service cloud.firestore {
       match /databases/{database}/documents {
         match /hairmeSessions/{sessionId} {
           allow read, write: if true;
           match /queue/{docId} {
             allow read, write: if true;
           }
         }
       }
     }
     ※社内限定運用前提の簡易ルール。公開運用する場合は要検討。
  5) firebase deploy (Hosting) でこの1ファイルを配信
  ============================================================
-->

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-app-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF;
    --bg-soft:#F6F5F9;
    --surface:#FFFFFF;
    --line:#ECEAF0;
    --ink:#17161B;
    --ink-soft:#7A7783;
    --accent:#FF3D68;
    --accent-2:#6E56CF;
    --accent-soft:#FFE7EC;
    --wait-bg:#F1F1F5;
    --wait-ink:#8A8895;
    --progress:#FF3D68;
    --done:#16A37A;
    --done-soft:#DFF6EC;
    --danger:#E5484D;
    --danger-soft:#FDE8E8;
    --shadow-card:0 4px 18px rgba(23,16,30,.07);
    --shadow-hero:0 10px 30px rgba(23,16,30,.10);
    --radius-lg:22px;
    --radius-md:16px;
    --radius-sm:12px;
    --font-display:"Zen Maru Gothic","Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
    --font-body:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-tap-highlight-color:transparent;
    overflow-x:hidden;
    width:100%;
  }
  body{min-height:100vh;}
  button{
    font-family:inherit;
    cursor:pointer;
    border:1px solid var(--line);
    color:var(--ink);
    background:var(--surface);
    border-radius:999px;
    padding:13px 18px;
    font-size:14.5px;
    font-weight:700;
    transition:opacity .15s ease, transform .05s ease, box-shadow .15s ease;
  }
  button:active{transform:scale(0.96);}
  button:disabled{opacity:.35;cursor:not-allowed;}
  input,select{
    font-family:inherit;
    font-size:14.5px;
    background:var(--bg-soft);
    border:1px solid transparent;
    color:var(--ink);
    border-radius:var(--radius-sm);
    padding:12px 14px;
  }
  input::placeholder{color:var(--ink-soft);}
  input:focus,select:focus,button:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:1px;
  }

  .screen{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    padding:26px 18px 70px;
  }

  /* ---- 役割選択 ---- */
  .role-hero{
    margin-bottom:28px;
  }
  .eyebrow{
    display:inline-block;
    font-size:11px;
    font-weight:700;
    color:var(--accent);
    background:var(--accent-soft);
    letter-spacing:.14em;
    text-transform:uppercase;
    padding:5px 12px;
    border-radius:999px;
    margin-bottom:12px;
  }
  .role-hero h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:28px;
    margin:0;
    letter-spacing:.01em;
  }
  .role-title{
    font-size:13px;
    color:var(--ink-soft);
    margin:8px 0 0;
  }
  .role-grid{
    display:grid;
    gap:14px;
  }
  .role-card{
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:var(--shadow-card);
    border-radius:var(--radius-lg);
    padding:24px 22px;
    text-align:left;
  }
  .role-card:nth-child(1){border-top:4px solid var(--accent);}
  .role-card:nth-child(2){border-top:4px solid var(--accent-2);}
  .role-card .label{
    font-family:var(--font-display);
    font-size:19px;
    font-weight:700;
    display:block;
    margin-bottom:6px;
  }
  .role-card .desc{
    font-size:12.5px;
    color:var(--ink-soft);
    line-height:1.6;
  }

  /* ---- 共通ヘッダー ---- */
  .app-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:20px;
  }
  .app-header h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:19px;
    margin:0;
    letter-spacing:.01em;
  }
  .session-code{
    display:inline-block;
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:.04em;
    margin-top:4px;
    background:var(--bg-soft);
    padding:3px 10px;
    border-radius:999px;
  }
  .hairme-badge{
    display:inline-block;
    font-size:11px;
    color:var(--accent);
    letter-spacing:.02em;
    margin-top:4px;
    margin-left:6px;
    background:var(--accent-soft);
    padding:3px 10px;
    border-radius:999px;
    font-weight:700;
  }
  .header-actions{
    display:flex;
    align-items:center;
    gap:4px;
    flex-shrink:0;
  }
  .icon-btn{
    width:40px;height:40px;
    border-radius:50%;
    padding:0;
    display:flex;align-items:center;justify-content:center;
    background:var(--bg-soft);
    border:none;
    font-size:18px;
    color:var(--ink-soft);
  }
  .icon-btn svg{width:19px;height:19px;display:block;stroke:currentColor;}
  .icon-btn.reset{color:var(--danger);background:var(--danger-soft);}
  .link-reset{
    background:none;
    border:none;
    color:var(--ink-soft);
    text-decoration:underline;
    text-underline-offset:2px;
    font-size:12px;
    font-weight:400;
    padding:4px;
  }
  .link-small{
    background:none;
    border:none;
    color:var(--accent);
    font-size:11.5px;
    font-weight:700;
    padding:2px 4px;
  }

  /* ---- QRモーダル ---- */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(23,16,30,.5);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:80;
  }
  .modal-card{
    width:100%;
    max-width:340px;
    background:var(--surface);
    border-radius:var(--radius-lg);
    padding:24px 22px;
    text-align:center;
    box-shadow:var(--shadow-hero);
  }
  .modal-card h2{
    font-family:var(--font-display);
    font-size:17px;
    margin:0 0 4px;
  }
  .modal-card .sub{
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:4px;
  }
  .modal-close{
    width:100%;
    margin-top:18px;
    background:var(--ink);
    border-color:var(--ink);
    color:#fff;
    padding:14px;
  }
  .chip.assigned{background:var(--bg-soft);color:var(--ink);font-weight:700;}
  .other-progress{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:22px;
  }
  .other-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12.5px;
    color:var(--ink-soft);
    padding:11px 14px;
    background:var(--bg-soft);
    border-radius:var(--radius-sm);
  }
  .other-row b{color:var(--ink);}
  .name-field-box{
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:var(--shadow-card);
    border-radius:var(--radius-lg);
    padding:20px;
    margin-bottom:16px;
  }
  .name-field-box label{
    display:block;
    font-size:12px;
    font-weight:700;
    color:var(--ink-soft);
    margin-bottom:8px;
  }
  .name-field-box input{width:100%;}
  .name-field-hint{
    font-size:11px;
    color:var(--ink-soft);
    margin-top:8px;
  }

  /* ---- ペアリング(店舗) ---- */
  .qr-box{
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:var(--shadow-card);
    border-radius:var(--radius-lg);
    padding:28px 24px;
    text-align:center;
  }
  .qr-box #qrcode{
    display:inline-block;
    background:#fff;
    padding:14px;
    border-radius:var(--radius-md);
    box-shadow:var(--shadow-card);
    margin:16px 0;
  }
  .qr-code-text{
    font-family:var(--font-display);
    font-size:28px;
    letter-spacing:.16em;
    font-weight:700;
    color:var(--accent);
  }

  /* ---- ペアリング(ヘアメ) ---- */
  .join-box{
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:var(--shadow-card);
    border-radius:var(--radius-lg);
    padding:22px;
  }
  #scan-video{
    width:100%;
    border-radius:var(--radius-md);
    background:#000;
    margin:12px 0;
  }
  .join-manual{
    display:flex;
    gap:8px;
    margin-top:14px;
    flex-wrap:wrap;
  }
  .join-manual input{flex:1 1 120px;min-width:0;text-transform:uppercase;border-radius:999px;}
  .join-manual button{flex-shrink:0;background:var(--ink);color:#fff;border-color:var(--ink);}

  /* ---- summary bar ---- */
  .summary{
    display:flex;
    gap:12px;
    margin-bottom:20px;
  }
  .summary .card{
    flex:1;
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:var(--shadow-card);
    border-radius:var(--radius-md);
    padding:16px 16px;
  }
  .summary .num{
    font-family:var(--font-display);
    font-size:24px;
    font-weight:700;
    color:var(--accent);
  }
  .summary .cap{
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:.03em;
    margin-top:4px;
  }

  /* ---- 店舗画面: ステータスカード ---- */
  .stat-card{
    flex:1;
    min-width:0;
    display:flex;
    align-items:center;
    gap:11px;
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:var(--shadow-card);
    border-radius:var(--radius-md);
    padding:13px 14px;
  }
  .stat-icon{
    width:40px;height:40px;
    border-radius:12px;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .stat-icon svg{width:21px;height:21px;stroke:currentColor;}
  .stat-info{min-width:0;flex:1;}
  .stat-value{
    font-family:var(--font-display);
    font-size:16px;
    font-weight:700;
    line-height:1.25;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .stat-card.wait .stat-value{font-size:22px;}
  .stat-label{
    font-size:10.5px;
    color:var(--ink-soft);
    margin-top:2px;
    letter-spacing:.02em;
  }
  .stat-card.free .stat-icon{background:var(--done-soft);color:var(--done);}
  .stat-card.free .stat-value{color:var(--done);}
  .stat-card.busy .stat-icon{background:var(--accent-soft);color:var(--accent);}
  .stat-card.busy .stat-value{color:var(--accent);}
  .stat-card.wait .stat-icon{background:#ECE8FA;color:var(--accent-2);}
  .stat-card.wait .stat-value{color:var(--accent-2);}

  /* ---- 追加フォーム(店舗) : 順番登録がメイン作業なので目立たせる ---- */
  .add-form{
    background:linear-gradient(155deg, #FFFFFF 0%, var(--accent-soft) 145%);
    border:1.5px solid var(--accent);
    box-shadow:0 12px 28px rgba(255,61,104,.18);
    border-radius:var(--radius-lg);
    padding:20px 18px;
    margin-bottom:26px;
  }
  .add-form-title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:15px;
    color:var(--accent);
    margin-bottom:13px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .add-form .row{
    display:flex;
    gap:8px;
    margin-bottom:12px;
  }
  .add-form .row:last-child{margin-bottom:0;}
  .add-form input[name=name]{
    flex:1;
    font-size:16px;
    padding:14px 15px;
    background:#fff;
    border:1px solid var(--line);
  }
  .add-form select{flex:1;}
  .add-form .submit{
    width:100%;
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
    font-weight:700;
    font-size:16px;
    padding:16px;
    box-shadow:0 6px 16px rgba(255,61,104,.32);
  }

  /* ---- キュー一覧 ---- */
  .section-label{
    font-size:11px;
    color:var(--ink-soft);
    font-weight:700;
    letter-spacing:.1em;
    text-transform:uppercase;
    margin:24px 0 12px;
  }
  .queue-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .q-item{
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:var(--shadow-card);
    border-radius:var(--radius-md);
    padding:13px 14px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .q-item.status-in_progress{
    border:1px solid var(--accent);
    background:linear-gradient(135deg, var(--accent-soft), #fff 60%);
  }
  .q-item .pos{
    font-family:var(--font-display);
    font-size:13px;
    font-weight:700;
    color:var(--ink-soft);
    width:22px;
    height:22px;
    border-radius:50%;
    background:var(--bg-soft);
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .pos-ring{
    width:28px;height:28px;border-radius:50%;
    flex-shrink:0;
    background:conic-gradient(var(--accent) calc(var(--pct,0)*1%), var(--line) 0);
    display:flex;align-items:center;justify-content:center;
  }
  .pos-ring .pos-ring-inner{
    width:21px;height:21px;border-radius:50%;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:700;color:var(--accent);
  }
  .q-item .info{flex:1;min-width:0;}
  .q-item .name{
    font-size:14.5px;
    font-weight:700;
  }
  .q-item .meta{
    font-size:11px;
    color:var(--ink-soft);
    margin-top:4px;
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    align-items:center;
  }
  .chip{
    display:inline-flex;
    align-items:center;
    gap:4px;
    font-size:10.5px;
    font-weight:700;
    padding:3px 9px;
    border-radius:999px;
  }
  .chip.waiting{background:var(--wait-bg);color:var(--wait-ink);}
  .chip.in_progress{background:var(--accent);color:#fff;}
  .chip.done{background:var(--done-soft);color:var(--done);}
  .chip.cancelled{background:var(--danger-soft);color:var(--danger);}
  .q-item .ctrl{
    display:flex;
    gap:4px;
    flex-shrink:0;
  }
  .q-item .ctrl button{
    padding:7px 10px;
    font-size:13px;
    background:var(--bg-soft);
    border:none;
  }
  .q-item .ctrl button.danger{color:var(--danger);background:var(--danger-soft);}

  .empty-hint{
    color:var(--ink-soft);
    font-size:12.5px;
    text-align:center;
    padding:28px 10px;
    background:var(--bg-soft);
    border-radius:var(--radius-md);
  }

  .name-cancelled{
    text-decoration:line-through;
    color:var(--ink-soft);
  }
  .q-item.status-cancelled{opacity:.65;box-shadow:none;}
  .note-text{
    font-style:italic;
    color:var(--ink-soft);
    width:100%;
  }

  /* ---- ヘアメ操作カード ---- */
  .current-card{
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:var(--shadow-hero);
    border-radius:var(--radius-lg);
    padding:24px;
    margin-bottom:22px;
  }
  .current-card .cur-head{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:18px;
  }
  .ring{
    width:60px;height:60px;border-radius:50%;flex-shrink:0;
    background:conic-gradient(var(--accent) calc(var(--pct,0)*1%), var(--line) 0);
    display:flex;align-items:center;justify-content:center;
  }
  .ring .ring-inner{
    width:48px;height:48px;border-radius:50%;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-size:18px;font-weight:700;
    color:var(--accent);
  }
  .current-card .cur-name{
    font-family:var(--font-display);
    font-size:21px;
    font-weight:700;
    margin-bottom:4px;
  }
  .current-card .cur-meta{
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .current-card .edit-toggle{
    font-size:12px;
    font-weight:700;
    color:var(--accent);
    background:var(--accent-soft);
    border:none;
    padding:5px 12px;
    margin-bottom:0;
  }
  .style-chosen-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size:13.5px;
    margin-bottom:12px;
  }
  .style-chosen-row b{font-family:var(--font-display);color:var(--accent);}
  .finish-note{
    width:100%;
    resize:vertical;
    margin-bottom:14px;
    font-family:inherit;
    font-size:13.5px;
    background:var(--bg-soft);
    border:1px solid transparent;
    color:var(--ink);
    border-radius:var(--radius-sm);
    padding:12px 14px;
  }
  .finish-note:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .big-btn{
    width:100%;
    padding:16px;
    font-size:15.5px;
    font-weight:700;
    border-radius:999px;
  }
  .big-btn.start{
    background:var(--ink);
    border-color:var(--ink);
    color:#fff;
  }
  .finish-row{
    display:flex;
    gap:10px;
  }
  .finish-row button{
    flex:1;
    padding:16px 8px;
    font-size:14.5px;
    font-weight:700;
    background:var(--bg-soft);
    border:none;
  }
  .finish-row button:active{background:var(--accent);color:#fff;}
  .elapsed{
    font-variant-numeric:tabular-nums;
    color:var(--accent);
    font-weight:700;
  }

  .next-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .next-list .n-row{
    display:flex;
    justify-content:space-between;
    font-size:12.5px;
    color:var(--ink-soft);
    padding:11px 14px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
  }
  .next-list .n-row b{color:var(--ink);font-family:var(--font-display);font-weight:700;}

  details.done-log{
    margin-top:22px;
  }
  details.done-log summary{
    cursor:pointer;
    font-size:11.5px;
    font-weight:700;
    color:var(--ink-soft);
    letter-spacing:.06em;
    padding:4px 0;
  }

  .toast{
    position:fixed;
    bottom:24px;left:50%;
    transform:translateX(-50%);
    background:var(--ink);
    border:1px solid var(--ink);
    color:#fff;
    padding:11px 20px;
    border-radius:999px;
    font-size:12.5px;
    font-weight:700;
    box-shadow:var(--shadow-hero);
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
    z-index:50;
  }
  .toast.show{opacity:1;}

  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;}
  }

  .demo-banner{
    position:sticky;
    top:0;
    z-index:60;
    background:var(--accent-soft);
    color:var(--accent);
    text-align:center;
    font-size:11.5px;
    font-weight:700;
    padding:8px 10px;
  }
/* =========================================================

<script>
/* =========================================================
   Firebase 設定：ここに新規（または既存）プロジェクトの値を入れる
   ========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyBbnEuWfPLdMRmEg7ln5HF7okh4QDD6cMU",
  authDomain: "hair-9821d.firebaseapp.com",
  projectId: "hair-9821d",
  storageBucket: "hair-9821d.firebasestorage.app",
  messagingSenderId: "592601877982",
  appId: "1:592601877982:web:c6c57204f53eb3b539a14f"
};

let db = null;
let FieldValue = null;
let usingDemoBackend = false;

/* ---- デモモード用：メモリ内の簡易Firestore互換モック ----
   firebaseConfigが未設定（プレースホルダーのまま）の場合はこちらを使う。
   実際のFirestoreへは一切保存されず、リロードするとデータは消える。 */
function createDemoFirestore(){
  const SERVER_TS = Symbol('serverTimestamp');
  const store = {};      // path -> data
  const listeners = {};  // key -> Set<fn>
  let counter = 1;

  function resolve(data){
    const out = {};
    for(const k in data){
      out[k] = (data[k] === SERVER_TS) ? { toMillis: (()=>{ const ms = Date.now(); return ()=>ms; })() } : data[k];
    }
    return out;
  }
  function notify(key){ (listeners[key]||new Set()).forEach(fn=>fn()); }
  function collectionKey(path){ return 'COL:'+path; }

  function docRef(path){
    const parentCol = path.split('/').slice(0,-1).join('/');
    return {
      id: path.split('/').pop(),
      async set(data){ store[path] = {...(store[path]||{}), ...resolve(data)}; notify(path); notify(collectionKey(parentCol)); },
      async update(data){ store[path] = {...(store[path]||{}), ...resolve(data)}; notify(path); notify(collectionKey(parentCol)); },
      async delete(){ delete store[path]; notify(path); notify(collectionKey(parentCol)); },
      async get(){ const d = store[path]; return { exists: !!d, id: path.split('/').pop(), data: ()=> d ? {...d} : undefined }; },
      onSnapshot(cb){
        listeners[path] = listeners[path] || new Set();
        const fire = ()=>{ const d = store[path]; cb({ data: ()=> d ? {...d} : undefined }); };
        listeners[path].add(fire); fire();
        return ()=>listeners[path].delete(fire);
      },
      collection(name){ return collectionRef(path+'/'+name); }
    };
  }
  function collectionRef(path){
    const depth = path.split('/').length;
    return {
      doc(id){ return docRef(path+'/'+(id || ('auto'+(counter++)))); },
      async add(data){ const id = 'auto'+(counter++); store[path+'/'+id] = resolve(data); notify(collectionKey(path)); return {id}; },
      orderBy(field, dir){
        return {
          onSnapshot(cb, errCb){
            const key = collectionKey(path);
            listeners[key] = listeners[key] || new Set();
            const fire = ()=>{
              const docs = Object.keys(store)
                .filter(p=>p.startsWith(path+'/') && p.split('/').length === depth+1)
                .map(p=>({id:p.split('/').pop(), data:()=>({...store[p]})}));
              docs.sort((a,b)=>{ const av=a.data()[field]||0, bv=b.data()[field]||0; return dir==='desc' ? bv-av : av-bv; });
              cb({docs});
            };
            listeners[key].add(fire); fire();
            return ()=>listeners[key].delete(fire);
          }
        };
      }
    };
  }
  return {
    collection(name){ return collectionRef(name); },
    batch(){
      const ops = [];
      return { update(ref,data){ ops.push(()=>ref.update(data)); }, async commit(){ for(const op of ops) await op(); } };
    },
    async runTransaction(updateFn){
      // デモモードは単一メモリ内なので簡易実装（本物のFirestoreのような競合検知はしない）
      const tx = {
        async get(ref){ return await ref.get(); },
        update(ref, data){ ref.update(data); }
      };
      return await updateFn(tx);
    },
    _SERVER_TS: SERVER_TS
  };
}

function isFirebaseConfigured(cfg){
  return !!(cfg && cfg.apiKey && cfg.projectId && cfg.apiKey !== '___' && cfg.projectId !== '___');
}

if(isFirebaseConfigured(firebaseConfig) && typeof firebase !== 'undefined'){
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    // モバイルのアプリ内ブラウザ/プロキシ環境などではWebChannelのストリーミング接続(gRPC-Web)が
    // 「transport errored」で失敗し続けることがあるため、long pollingへ自動フォールバックさせる。
    try{
      db.settings({ experimentalForceLongPolling: true, useFetchStreams: false, merge: true });
    }catch(settingsErr){
      console.warn("Firestore settings適用に失敗", settingsErr);
    }
    FieldValue = firebase.firestore.FieldValue;
  }catch(e){
    console.error("Firebase初期化エラー", e);
  }
}
if(!db){
  // firebaseConfigが未設定、またはFirebase初期化に失敗した場合はデモモードで動作させる
  usingDemoBackend = true;
  db = createDemoFirestore();
  FieldValue = { serverTimestamp: ()=> db._SERVER_TS };
  console.warn("Firebase未設定のため、デモモード（メモリ内モック）で動作しています。データは保存されません。");
  document.addEventListener('DOMContentLoaded', ()=>{
    const b = document.getElementById('demo-banner');
    if(b) b.style.display = 'block';
  });
  // scriptはbody末尾にあるためDOMContentLoadedを待たずとも要素は既に存在する
  const bannerEl = document.getElementById('demo-banner');
  if(bannerEl) bannerEl.style.display = 'block';
}

/* ---------------- ユーティリティ ---------------- */
const $app = document.getElementById('app');
const $toast = document.getElementById('toast');
function toast(msg){
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>$toast.classList.remove('show'), 2200);
}
function genSessionId(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // 紛らわしい文字除外
  let s = '';
  for(let i=0;i<6;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function nowMs(){ return Date.now(); }
function tsToMs(ts){
  if(!ts) return null;
  if(typeof ts.toMillis === 'function') return ts.toMillis();
  return null;
}
function fmtMin(mins){
  mins = Math.max(0, Math.round(mins));
  if(mins < 1) return '1分未満';
  return mins + '分';
}
function fmtClock(ms){
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const ss = s%60;
  return String(m).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
}

const DEFAULT_EST_MINUTES = 15; // 一人あたりの目安時間（セットのみ運用のため一律）
const STORE_NAME = '綺薇';
function fmtHM(d){
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function genId(){ return 'r' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function normalizeCode(s){ return String(s||'').trim().toLowerCase(); }
function findRosterMatch(roster, input){
  const n = normalizeCode(input);
  if(!n) return null;
  return (roster||[]).find(r => normalizeCode(r.name) === n || (r.code && normalizeCode(r.code) === n)) || null;
}

/* ---------------- ローカル状態の保存 ---------------- */
const LS_KEY = 'hairme_role_session_v2';
function saveLocal(role, sessionId){
  localStorage.setItem(LS_KEY, JSON.stringify({role, sessionId}));
}
function loadLocal(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY) || 'null'); }

/* ---------------- ヘアメ本人の名前/コード（端末に記憶し、以後は自動判別） ---------------- */
const LS_PROFILE_KEY = 'hairme_profile_name_v1';
function saveHairmeName(name){

}
function loadHairmeName(){

/* =========================================================
   ルーティング

let state = {
  role: null,
  sessionId: null,

  unsubQueue: null,
  unsubSession: null,
  hairmeRoster: [],

function boot(){

  if(joinParam){
    // QR/リンク経由の参加。セッションの存在とヘアメ登録名を確認したうえで参加する。
    history.replaceState(null, '', location.pathname);
    checkSessionAndProceed(joinParam.toUpperCase());

  }

  const local = loadLocal();
  if(local && local.role && local.sessionId){

// セッションコードが有効か確認し、記憶済みの名前があれば自動参加、なければ名前入力へ進む
async function checkSessionAndProceed(sessionId){
  if(!db){ toast('Firebase設定が未入力です'); return; }
  try{
    const doc = await db.collection('hairmeSessions').doc(sessionId).get();
    if(!doc.exists){ toast('セッションが見つかりません'); renderHairmeJoin(); return; }
    const savedName = loadHairmeName();
    if(savedName){
      const ok = await joinSession(sessionId, savedName);
      if(ok) return;
    }
    renderHairmeNamePrompt(sessionId);
  }catch(e){
    console.error(e);
    toast('参加に失敗しました: ' + (e && (e.code || e.message) || '不明なエラー'));

}

// QRコードを指定要素に描画する共通ヘルパー（セットアップ画面・モーダルの両方から使用）
function renderQrInto(elId, sessionId){
  const el = document.getElementById(elId);
  if(!el) return;
  const joinUrl = `${location.origin}${location.pathname}?join=${sessionId}`;

    if(typeof QRCode === 'undefined'){

    el.innerHTML = '';
    new QRCode(el, {
      text: joinUrl,
      width: 200,
      height: 200,
      colorDark: "#17161b",
      colorLight: "#ffffff"
    });
  }catch(e){
    console.error("QR描画に失敗しました", e);
    el.innerHTML = `<div style="padding:20px;color:var(--ink-soft);font-size:12px;">QR画像を生成できませんでした。下のコードを手入力してください。</div>`;

   ヘアメが参加時に入力する「フルネーム／コード」はここで店舗が事前登録する。
   ========================================================= */
async function renderStoreRoster(){
  teardown();

    <div class="app-header">
      <h1>ヘアメ登録</h1>
      <button class="link-reset" id="btn-back">戻る</button>
    </div>

  `;
  document.getElementById('btn-back').onclick = renderStoreDashboard;

  try{

  }catch(e){
    console.error(e);
    toast('読み込みに失敗しました');
  }

function drawStoreRoster(roster){
  $app.innerHTML = `

      <h1>ヘアメ登録</h1>
      <button class="link-reset" id="btn-back">戻る</button>

      <button class="big-btn start" id="btn-roster-add" style="margin-top:14px;">登録する</button>
      <div class="name-field-hint">ヘアメはここで登録した「フルネーム」または「コード」のどちらかを入力して参加します</div>
    </div>

    <div class="section-label">登録済みヘアメ（${roster.length}名）</div>
    <div class="queue-list" id="roster-list">
      ${roster.length ? roster.map(r=>`
        <div class="q-item">
          <div class="info">
            <div class="name">${escapeHtml(r.name)}</div>
            ${r.code ? `<div class="meta">コード: ${escapeHtml(r.code)}</div>` : ''}
          </div>
          <div class="ctrl"><button class="danger" id="del-${r.id}" title="削除">×</button></div>

      `).join('') : `<div class="empty-hint">まだ登録がありません</div>`}

  `;

  document.getElementById('btn-back').onclick = renderStoreDashboard;
  document.getElementById('btn-roster-add').onclick = ()=>addRosterEntry(roster);
  roster.forEach(r=>{
    const btn = document.getElementById('del-'+r.id);
    if(btn) btn.onclick = ()=>removeRosterEntry(roster, r.id);
  });

async function addRosterEntry(roster){
  const nameInput = document.getElementById('roster-name');
  const codeInput = document.getElementById('roster-code');
  const name = nameInput.value.trim();
  const code = codeInput.value.trim();
  if(!name){ toast('フルネームを入力してください'); return; }
  if(findRosterMatch(roster, name) || (code && findRosterMatch(roster, code))){
    toast('同じ名前・コードが既に登録されています');
    return;
  }
  const newRoster = [...roster, {id: genId(), name, code: code || null}];
  try{
    await db.collection('hairmeSessions').doc(state.sessionId).update({hairmeRoster: newRoster});
    toast(`${name}さんを登録しました`);
    drawStoreRoster(newRoster);
  }catch(e){
    console.error(e);
    toast('登録に失敗しました');
  }
}

async function removeRosterEntry(roster, id){
  const target = roster.find(r=>r.id===id);
  if(target && !confirm(`${target.name}さんを削除しますか？`)) return;
  const newRoster = roster.filter(r=>r.id!==id);
  try{
    await db.collection('hairmeSessions').doc(state.sessionId).update({hairmeRoster: newRoster});
    drawStoreRoster(newRoster);
  }catch(e){
    console.error(e);
    toast('削除に失敗しました');
  }
}

async function startScan(){
  if(typeof jsQR === 'undefined'){
    toast('QR読み取り機能が利用できません。コードを直接入力してください');
    return;
  }
  const video = document.getElementById('scan-video');
  video.style.display = 'block';
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  try{
    scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = scanStream;
    await video.play();
  }catch(e){
    toast('カメラを起動できませんでした');
    return;
  }

  function tick(){
    if(video.readyState === video.HAVE_ENOUGH_DATA){
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height);
      if(code && code.data){
        stopScan();
        let val = code.data;
        try{
          const u = new URL(val);
          val = u.searchParams.get('join') || val;
        }catch(e){ /* 生のコード文字列の場合はそのまま */ }
        checkSessionAndProceed(val.toUpperCase());
        return;
      }
    }
    scanRAF = requestAnimationFrame(tick);
  }
  scanRAF = requestAnimationFrame(tick);
}
function stopScan(){
  if(scanRAF) cancelAnimationFrame(scanRAF);
  if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream = null; }
}

// hairmeName が店舗登録済みの一覧（フルネーム or コード）と一致する場合のみ参加させる。
// 一致すれば登録されている「フルネーム」を本人の識別名として採用する。
// 戻り値: 参加できたら true、できなければ false
async function joinSession(sessionId, hairmeName){
  if(!db){ toast('Firebase設定が未入力です'); return false; }
  if(!hairmeName || !hairmeName.trim()){ toast('あなたの名前・コードを入力してください'); return false; }
  try{
    const doc = await db.collection('hairmeSessions').doc(sessionId).get();
    if(!doc.exists){ toast('セッションが見つかりません'); return false; }
    const d = doc.data() || {};
    const roster = d.hairmeRoster || [];
    const match = findRosterMatch(roster, hairmeName);
    if(!match){
      toast('登録されていない名前・コードです。店舗にご確認ください');
      return false;
    }
    saveLocal('hairme', sessionId);
    saveHairmeName(match.name);
    state.role = 'hairme';
    state.sessionId = sessionId;
    state.hairmeName = match.name;
    renderHairmeDashboard();
    return true;
  }catch(e){
    console.error(e);
    toast('参加に失敗しました: ' + (e && (e.code || e.message) || '不明なエラー'));
    return false;
  }
}

/* =========================================================
   共通：Firestore購読
   ========================================================= */
function teardown(){
  stopScan();
  if(state.unsubQueue){ state.unsubQueue(); state.unsubQueue = null; }
  if(state.unsubSession){ state.unsubSession(); state.unsubSession = null; }
  if(state.tickTimer){ clearInterval(state.tickTimer); state.tickTimer = null; }
}

function subscribe(renderFn, tickFn){
  if(!db){ toast('Firebase設定が未入力です'); return; }
  teardown();
  state.unsubSession = db.collection('hairmeSessions').doc(state.sessionId)
    .onSnapshot(doc=>{
      const d = doc.data();
      state.hairmeRoster = (d && d.hairmeRoster) || [];
    });
  state.unsubQueue = db.collection('hairmeSessions').doc(state.sessionId)
    .collection('queue').orderBy('order','asc')
    .onSnapshot(snap=>{
      state.queue = snap.docs.map(d=>({id:d.id, ...d.data()}));
      renderFn();
    }, err=>{
      console.error(err);
      toast('同期エラーが発生しました');
    });
  // 1秒ごとのtickは経過時間・待ち時間の表示だけを更新する（tickFn未指定時のみ全体再描画にフォールバック）。
  // renderFnを毎秒呼ぶと入力中のフォーム（キャスト名・分数など）がその都度リセットされてしまうため分離している。
  state.tickTimer = setInterval(tickFn || renderFn, 1000);
}

function resetSession(){
  if(!confirm('セッションを解除して役割選択に戻りますか？')) return;
  teardown();
  clearLocal();
  state = {role:null, sessionId:null, hairmeName:null, unsubQueue:null, unsubSession:null, hairmeRoster:[], queue:[], tickTimer:null};
  renderRoleSelect();
}

/* =========================================================
   待ち時間計算
   ========================================================= */
function remainingMinutesFor(item){
  if(item.status !== 'in_progress') return item.estMinutes || 0;
  const startMs = tsToMs(item.startAt);
  if(!startMs) return item.estMinutes || 0;
  const elapsedMin = (nowMs() - startMs)/60000;
  return Math.max(0, (item.estMinutes||0) - elapsedMin);
}
function estimatedWaitFor(targetItem){
  let total = 0;
  for(const it of state.queue){
    if(it.order >= targetItem.order) continue;
    if(it.status === 'done' || it.status === 'cancelled') continue;
    total += remainingMinutesFor(it);
  }
  return total;
}

/* =========================================================
   画面：店舗ダッシュボード
   ========================================================= */
function renderStoreDashboard(){
  subscribe(drawStoreDashboard, updateStoreDashboardTimes);
  drawStoreDashboard();
}

// 全体を再描画せず、待ち時間・経過時間のテキストだけを毎秒更新する（入力欄の値を消さないため）
function updateStoreDashboardTimes(){
  const activeItems = state.queue.filter(q=>q.status!=='done' && q.status!=='cancelled').sort((a,b)=>a.order-b.order);
  activeItems.forEach(it=>{
    if(it.status === 'in_progress'){
      const el = document.getElementById('elapsed-'+it.id);
      if(el){
        const startMs = tsToMs(it.startAt);
        el.textContent = startMs ? fmtClock(nowMs()-startMs) : '--:--';
      }
    }else if(it.status === 'waiting'){
      const el = document.getElementById('wait-'+it.id);
      if(el) el.textContent = '約' + fmtMin(estimatedWaitFor(it));
    }
  });
}

function progressPct(it){
  if(it.status !== 'in_progress') return 0;
  const startMs = tsToMs(it.startAt);
  if(!startMs || !it.estMinutes) return 0;
  const elapsedMin = (nowMs()-startMs)/60000;
  return Math.max(0, Math.min(100, (elapsedMin/it.estMinutes)*100));
}

function renderProgressCard(it){
  const startMs = tsToMs(it.startAt);
  const elapsed = startMs ? fmtClock(nowMs()-startMs) : '--:--';
  const canCancel = false; // 施術中はキャンセル不可（既存仕様を維持）
  return `
    <div class="progress-card">
      <div class="progress-name">${escapeHtml(it.name)}</div>
      <div class="progress-elapsed">
        <div class="progress-elapsed-label">経過時間</div>
        <div class="progress-elapsed-value" id="elapsed-${it.id}">${elapsed}</div>
      </div>
      <div class="progress-badge">施術中</div>
    </div>
  `;
}

function renderWaitRow(it, idx){
  const wait = estimatedWaitFor(it);
  return `
    <div class="wait-row">
      <div class="wait-pos">${idx+1}</div>
      <div class="wait-name">${escapeHtml(it.name)}</div>
      <div class="wait-eta">
        <div class="wait-eta-label">予想待ち</div>
        <div class="wait-eta-value" id="wait-${it.id}">約${fmtMin(wait)}</div>
      </div>
      <div class="wait-actions">
        <button id="up-${it.id}" title="上へ">↑</button>
        <button id="down-${it.id}" title="下へ">↓</button>
        <button id="cancel-${it.id}" class="danger" title="キャンセル">×</button>
      </div>
    </div>
  `;
}

function renderDoneItem(it){
  if(it.status === 'cancelled'){
    return `
      <div class="q-item status-cancelled">
        <div class="info">
          <div class="name name-cancelled">${escapeHtml(it.name)}</div>
          <div class="meta">
            <span class="chip cancelled">キャンセル</span>
          </div>
        </div>
      </div>
    `;
  }
  const s = tsToMs(it.startAt), e = tsToMs(it.endAt);
  const actual = (s && e) ? fmtMin((e-s)/60000) : '-';
  const styleLabel = it.style === 'up' ? 'アップ' : it.style === 'down' ? 'ダウン' : '-';
  return `
    <div class="q-item status-done">
      <div class="info">
        <div class="name">${escapeHtml(it.name)}</div>
        <div class="meta">
          <span class="chip done">完了</span>
          <span>実施 ${actual}</span>
          <span>髪型: ${styleLabel}</span>
        </div>
        ${it.note ? `<div class="meta note-text">メモ: ${escapeHtml(it.note)}</div>` : ''}
      </div>
    </div>
  `;
}

async function moveOrder(item, dir, activeItems){
  const idx = activeItems.findIndex(x=>x.id===item.id);
  const swapIdx = idx + dir;
  if(swapIdx < 0 || swapIdx >= activeItems.length) return;
  const other = activeItems[swapIdx];
  if(other.status !== 'waiting') return; // 施術中/完了とは入れ替えない
  const batch = db.batch();
  const col = db.collection('hairmeSessions').doc(state.sessionId).collection('queue');
  batch.update(col.doc(item.id), {order: other.order});
  batch.update(col.doc(other.id), {order: item.order});
  try{ await batch.commit(); }
  catch(e){ console.error(e); toast('並び替えに失敗しました'); }
}

async function claimItem(item, hairmeName){
  const ref = db.collection('hairmeSessions').doc(state.sessionId).collection('queue').doc(item.id);
  try{
    await db.runTransaction(async tx=>{
      const doc = await tx.get(ref);
      const d = doc.data ? doc.data() : null;
      if(!d) throw new Error('not-found');
      if(d.status !== 'waiting') throw new Error('taken');
      tx.update(ref, {
        status: 'in_progress',
        startAt: FieldValue.serverTimestamp(),
        hairmeCode: hairmeName
      });
    });
  }catch(e){
    if(e && e.message === 'taken'){ toast('すでに他のヘアメが対応を開始しています'); }
    else{ console.error(e); toast('開始に失敗しました'); }
  }
}

async function cancelItem(item){
  if(!confirm(`${item.name}さんをキャンセルしますか？`)) return;
  try{
    await db.collection('hairmeSessions').doc(state.sessionId).collection('queue').doc(item.id).update({
      status: 'cancelled',
      endAt: FieldValue.serverTimestamp()
    });
  }catch(e){ console.error(e); toast('キャンセルに失敗しました'); }
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* =========================================================
   画面：ヘアメダッシュボード
   ========================================================= */
function renderHairmeDashboard(){
  subscribe(drawHairmeDashboard, updateHairmeDashboardTimes);
  drawHairmeDashboard();
}

// 全体を再描画せず、施術中の経過時間だけを毎秒更新する（メニュー編集フォームの入力値を消さないため）
function updateHairmeDashboardTimes(){
  const inProgress = state.queue.find(q=>q.status==='in_progress' && q.hairmeCode===state.hairmeName);
  if(!inProgress) return;
  const el = document.getElementById('cur-elapsed');
  if(el){
    const startMs = tsToMs(inProgress.startAt);
    el.textContent = startMs ? fmtClock(nowMs()-startMs) : '--:--';
  }
  const ring = document.getElementById('cur-ring');
  if(ring) ring.style.setProperty('--pct', progressPct(inProgress));
}

let finishDraft = {itemId:null, style:null, note:''};

function drawHairmeDashboard(){
  const waiting = state.queue.filter(q=>q.status==='waiting').sort((a,b)=>a.order-b.order);
  // 自分が今対応しているキャスト（複数のヘアメが同じ列を共有するため、自分の担当だけを見る）
  const myInProgress = state.queue.find(q=>q.status==='in_progress' && q.hairmeCode===state.hairmeName);
  // 他のヘアメが対応中のキャスト（参考表示のみ）
  const othersInProgress = state.queue.filter(q=>q.status==='in_progress' && q.hairmeCode!==state.hairmeName);
  // 誰も担当していない先頭のキャスト＝自分がこれから呼べる候補
  const nextAvailable = myInProgress ? null : (waiting[0] || null);
  const inProgress = myInProgress; // 以下、既存ロジックとの互換用エイリアス
  const current = myInProgress || nextAvailable || null;
  const upcoming = myInProgress ? waiting : waiting.slice(1);

  let currentBlock = `<div class="empty-hint">待機中のキャストはいません</div>`;

  if(current){
    if(inProgress){
      if(finishDraft.itemId !== current.id){
        finishDraft = {itemId: current.id, style: null, note: ''};
      }
      const startMs = tsToMs(current.startAt);
      const elapsed = startMs ? fmtClock(nowMs()-startMs) : '--:--';
      const pct = progressPct(current);
      const initial = (current.name||'').trim().charAt(0) || '?';
      const styleLabel = finishDraft.style === 'up' ? 'アップ' : finishDraft.style === 'down' ? 'ダウン' : '';
      const finishArea = finishDraft.style ? `
            <div class="style-chosen-row">
              <span>髪型: <b>${styleLabel}</b></span>
              <button class="edit-toggle" id="btn-restyle">選び直す</button>
            </div>
            <textarea id="finish-note" class="finish-note" placeholder="メモ（任意）" rows="2">${escapeHtml(finishDraft.note)}</textarea>
            <button class="big-btn start" id="btn-finish-complete">完了</button>
          ` : `
            <div class="finish-row">
              <button id="finish-up">アップ で終了</button>
              <button id="finish-down">ダウン で終了</button>
            </div>
          `;
      currentBlock = `
        <div class="current-card">
          <div class="cur-head">
            <div class="ring" id="cur-ring" style="--pct:${pct}"><div class="ring-inner">${escapeHtml(initial)}</div></div>
            <div>
              <div class="cur-name">${escapeHtml(current.name)}</div>
              <div class="cur-meta">予定${current.estMinutes}分・経過 <span class="elapsed" id="cur-elapsed">${elapsed}</span></div>
            </div>
          </div>
          ${finishArea}
        </div>
      `;
    }else{
      currentBlock = `
        <div class="current-card">
          <div class="cur-name">${escapeHtml(current.name)}</div>
          <div class="cur-meta" id="cur-meta-text">目安${current.estMinutes}分</div>
          <button class="big-btn start" id="btn-start">スタート</button>
        </div>
      `;
    }
  }

  const othersBlock = othersInProgress.length ? `
    <div class="section-label">他のヘアメが対応中</div>
    <div class="other-progress">
      ${othersInProgress.map(it=>`<div class="other-row"><span><b>${escapeHtml(it.hairmeCode||'?')}</b> ・ ${escapeHtml(it.name)}</span><span>予定${it.estMinutes}分</span></div>`).join('')}
    </div>
  ` : '';

  $app.innerHTML = `
    <div class="app-header">
      <div>
        <h1>ヘアメ用</h1>
        <div>
          <span class="session-code">コード: ${state.sessionId}</span><span class="hairme-badge">${escapeHtml(state.hairmeName||'')}</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="link-reset" id="btn-reset">解除</button>
      </div>
    </div>

    <div class="summary">
      <div class="card">
        <div class="num">${waiting.length}</div>
        <div class="cap">待機人数</div>
      </div>
      <div class="card">
        <div class="num">${inProgress ? '施術中' : '空き'}</div>
        <div class="cap">自分の状態</div>
      </div>
    </div>

    ${currentBlock}
    ${othersBlock}

    <div class="section-label">次に呼ぶキャスト</div>
    <div class="next-list">
      ${upcoming.length ? upcoming.map((it,i)=>`<div class="n-row"><span><b>${i+1}.</b> ${escapeHtml(it.name)}</span><span>${it.estMinutes}分</span></div>`).join('') : `<div class="empty-hint">なし</div>`}
    </div>

    <div style="text-align:center;margin-top:18px;">
      <button class="link-small" id="btn-change-name">別の名前で参加し直す</button>
    </div>
  `;

  document.getElementById('btn-reset').onclick = resetSession;
  document.getElementById('btn-change-name').onclick = ()=>{
    if(!confirm('この端末に記憶された名前を消去し、名前を入力し直しますか？')) return;
    clearHairmeName();
    teardown();
    renderHairmeNamePrompt(state.sessionId);
  };

  if(current && !inProgress){
    document.getElementById('btn-start').onclick = ()=>claimItem(current, state.hairmeName);
  }

  if(inProgress){
    if(!finishDraft.style){
      document.getElementById('finish-up').onclick = ()=>{ finishDraft.style = 'up'; drawHairmeDashboard(); };
      document.getElementById('finish-down').onclick = ()=>{ finishDraft.style = 'down'; drawHairmeDashboard(); };
    }else{
      document.getElementById('btn-restyle').onclick = ()=>{ finishDraft.style = null; drawHairmeDashboard(); };
      const noteInput = document.getElementById('finish-note');
      noteInput.oninput = ()=>{ finishDraft.note = noteInput.value; };
      document.getElementById('btn-finish-complete').onclick = ()=>finishCurrent(inProgress, finishDraft.style, finishDraft.note);
    }
  }
}

async function finishCurrent(item, style, note){
  try{
    await db.collection('hairmeSessions').doc(state.sessionId).collection('queue').doc(item.id).update({
      status: 'done',
      style,
      note: (note||'').trim() || null,
      endAt: FieldValue.serverTimestamp()
    });
    finishDraft = {itemId:null, style:null, note:''};
    toast('終了を記録しました');
  }catch(e){ console.error(e); toast('終了処理に失敗しました'); }
}

/* =========================================================
   起動
   ========================================================= */
boot();
</script>
