<!--
  ============================================================
  デプロイ手順（mto-shizuokaと同様の構成を想定）
  1) このアプリ専用のFirebaseプロジェクトを新規作成
     （既存のmto-shizuokaと混在させない場合は新規推奨。同一プロジェクトに
      別コレクション名で同居させる場合はfirebaseConfigを既存のものに差し替えでも可）
  2) Firestore を作成（本番モード）
  3) 下記 firebaseConfig に値を入力
  4) Firestoreルール例（sessionコードを知っている端末のみ読み書き可・簡易版）
     rules_version = '2';
     service cloud.firestore {
       match /databases/{database}/documents {
         match /hairmeSessions/{sessionId} {
           allow read, write: if true;
           match /queue/{docId} {
             allow read, write: if true;
           }
         }
       }
     }
     ※社内限定運用前提の簡易ルール。公開運用する場合は要検討。
  5) firebase deploy (Hosting) でこの1ファイルを配信
  ============================================================
-->

<body>

<div id="demo-banner" class="demo-banner" style="display:none;">デモモード：Firebase未設定のため、データは保存されません（画面遷移の確認用）</div>
<div id="app" class="screen"></div>
<div id="toast" class="toast"></div>

<script>
/* =========================================================
   Firebase 設定：ここに新規（または既存）プロジェクトの値を入れる
   ========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyBbnEuWfPLdMRmEg7ln5HF7okh4QDD6cMU",
  authDomain: "hair-9821d.firebaseapp.com",
  projectId: "hair-9821d",
  storageBucket: "hair-9821d.firebasestorage.app",
  messagingSenderId: "592601877982",
  appId: "1:592601877982:web:c6c57204f53eb3b539a14f"
};

let db = null;
let FieldValue = null;
let usingDemoBackend = false;

/* ---- デモモード用：メモリ内の簡易Firestore互換モック ----
   firebaseConfigが未設定（プレースホルダーのまま）の場合はこちらを使う。
   実際のFirestoreへは一切保存されず、リロードするとデータは消える。 */
function createDemoFirestore(){
  const SERVER_TS = Symbol('serverTimestamp');
  const store = {};      // path -> data
  const listeners = {};  // key -> Set<fn>
  let counter = 1;

  function resolve(data){
    const out = {};
    for(const k in data){
      out[k] = (data[k] === SERVER_TS) ? { toMillis: (()=>{ const ms = Date.now(); return ()=>ms; })() } : data[k];
    }
    return out;
  }
  function notify(key){ (listeners[key]||new Set()).forEach(fn=>fn()); }
  function collectionKey(path){ return 'COL:'+path; }

  function docRef(path){
    const parentCol = path.split('/').slice(0,-1).join('/');
    return {
      id: path.split('/').pop(),
      async set(data){ store[path] = {...(store[path]||{}), ...resolve(data)}; notify(path); notify(collectionKey(parentCol)); },
      async update(data){ store[path] = {...(store[path]||{}), ...resolve(data)}; notify(path); notify(collectionKey(parentCol)); },
      async delete(){ delete store[path]; notify(path); notify(collectionKey(parentCol)); },
      async get(){ const d = store[path]; return { exists: !!d, id: path.split('/').pop(), data: ()=> d ? {...d} : undefined }; },
      onSnapshot(cb){
        listeners[path] = listeners[path] || new Set();
        const fire = ()=>{ const d = store[path]; cb({ data: ()=> d ? {...d} : undefined }); };
        listeners[path].add(fire); fire();
        return ()=>listeners[path].delete(fire);
      },
      collection(name){ return collectionRef(path+'/'+name); }
    };
  }
  function collectionRef(path){
    const depth = path.split('/').length;
    return {
      doc(id){ return docRef(path+'/'+(id || ('auto'+(counter++)))); },
      async add(data){ const id = 'auto'+(counter++); store[path+'/'+id] = resolve(data); notify(collectionKey(path)); return {id}; },
      orderBy(field, dir){
        return {
          onSnapshot(cb, errCb){
            const key = collectionKey(path);
            listeners[key] = listeners[key] || new Set();
            const fire = ()=>{
              const docs = Object.keys(store)
                .filter(p=>p.startsWith(path+'/') && p.split('/').length === depth+1)
                .map(p=>({id:p.split('/').pop(), data:()=>({...store[p]})}));
              docs.sort((a,b)=>{ const av=a.data()[field]||0, bv=b.data()[field]||0; return dir==='desc' ? bv-av : av-bv; });
              cb({docs});
            };
            listeners[key].add(fire); fire();
            return ()=>listeners[key].delete(fire);
          }
        };
      }
    };
  }
  return {
    collection(name){ return collectionRef(name); },
    batch(){
      const ops = [];
      return { update(ref,data){ ops.push(()=>ref.update(data)); }, async commit(){ for(const op of ops) await op(); } };
    },
    _SERVER_TS: SERVER_TS
  };
}

function isFirebaseConfigured(cfg){
  return !!(cfg && cfg.apiKey && cfg.projectId && cfg.apiKey !== '___' && cfg.projectId !== '___');
}

if(isFirebaseConfigured(firebaseConfig) && typeof firebase !== 'undefined'){
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    // モバイルのアプリ内ブラウザ/プロキシ環境などではWebChannelのストリーミング接続(gRPC-Web)が
    // 「transport errored」で失敗し続けることがあるため、long pollingへ自動フォールバックさせる。
    try{
      db.settings({ experimentalForceLongPolling: true, useFetchStreams: false, merge: true });
    }catch(settingsErr){
      console.warn("Firestore settings適用に失敗", settingsErr);
    }
    FieldValue = firebase.firestore.FieldValue;
  }catch(e){
    console.error("Firebase初期化エラー", e);
  }
}
if(!db){
  // firebaseConfigが未設定、またはFirebase初期化に失敗した場合はデモモードで動作させる
  usingDemoBackend = true;
  db = createDemoFirestore();
  FieldValue = { serverTimestamp: ()=> db._SERVER_TS };
  console.warn("Firebase未設定のため、デモモード（メモリ内モック）で動作しています。データは保存されません。");
  document.addEventListener('DOMContentLoaded', ()=>{
    const b = document.getElementById('demo-banner');
    if(b) b.style.display = 'block';
  });
  // scriptはbody末尾にあるためDOMContentLoadedを待たずとも要素は既に存在する
  const bannerEl = document.getElementById('demo-banner');
  if(bannerEl) bannerEl.style.display = 'block';
}

/* ---------------- ユーティリティ ---------------- */
const $app = document.getElementById('app');
const $toast = document.getElementById('toast');
function toast(msg){
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>$toast.classList.remove('show'), 2200);
}
function genSessionId(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // 紛らわしい文字除外
  let s = '';
  for(let i=0;i<6;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function nowMs(){ return Date.now(); }
function tsToMs(ts){
  if(!ts) return null;
  if(typeof ts.toMillis === 'function') return ts.toMillis();
  return null;
}
function fmtMin(mins){
  mins = Math.max(0, Math.round(mins));
  if(mins < 1) return '1分未満';
  return mins + '分';
}
function fmtClock(ms){
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const ss = s%60;
  return String(m).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
}

const DEFAULT_MENUS = [
  {name:'セット', minutes:15},
  {name:'カット込み', minutes:25},
  {name:'アレンジ', minutes:20}
];

/* ---------------- ローカル状態の保存 ---------------- */
const LS_KEY = 'hairme_role_session_v1';
function saveLocal(role, sessionId){
  localStorage.setItem(LS_KEY, JSON.stringify({role, sessionId}));
}
function loadLocal(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY) || 'null'); }
  catch(e){ return null; }
}
function clearLocal(){ localStorage.removeItem(LS_KEY); }

/* ---------------- URL パラメータ (QR経由の直接参加) ---------------- */
function getJoinParamFromUrl(){
  const p = new URLSearchParams(location.search);
  return p.get('join');
}

/* =========================================================
   ルーティング
   ========================================================= */
let state = {
  role: null,
  sessionId: null,
  unsubQueue: null,
  unsubSession: null,
  menus: DEFAULT_MENUS,
  queue: [],
  tickTimer: null
};

function boot(){
  const joinParam = getJoinParamFromUrl();
  const local = loadLocal();

  if(joinParam){
    // QR/リンク経由：ヘアメとして即参加
    state.role = 'hairme';
    state.sessionId = joinParam.toUpperCase();
    saveLocal('hairme', state.sessionId);
    history.replaceState(null, '', location.pathname);
    renderHairmeDashboard();
    return;
  }

  if(local && local.role && local.sessionId){
    state.role = local.role;
    state.sessionId = local.sessionId;
    if(local.role === 'store') renderStoreDashboard();
    else renderHairmeDashboard();
    return;
  }

  renderRoleSelect();
}

/* =========================================================
   画面：役割選択
   ========================================================= */
function renderRoleSelect(){
  teardown();
  $app.innerHTML = `
    <div class="role-title">ヘアメ待ち管理 / 役割を選択</div>
    <div class="role-grid">
      <button class="role-card" id="btn-store">
        <span class="label">店舗用（黒服）</span>
        <span class="desc">キャストの受付・順番管理・ヘアメ状況の確認</span>
      </button>
      <button class="role-card" id="btn-hairme">
        <span class="label">ヘアメ用</span>
        <span class="desc">QRを読み取って参加。開始・終了・髪型の記録</span>
      </button>
    </div>
  `;
  document.getElementById('btn-store').onclick = renderStoreSetup;
  document.getElementById('btn-hairme').onclick = renderHairmeJoin;
}

/* =========================================================
   画面：店舗 - セッション作成 & QR表示
   ========================================================= */
function renderStoreSetup(){
  teardown();
  const sessionId = genSessionId();
  const joinUrl = `${location.origin}${location.pathname}?join=${sessionId}`;

  $app.innerHTML = `
    <div class="app-header">
      <h1>店舗用セットアップ</h1>
    </div>
    <div class="qr-box">
      <div style="font-size:13px;color:var(--subtext);">ヘアメ端末でこのQRを読み取ってください</div>
      <div id="qrcode"></div>
      <div class="qr-code-text">${sessionId}</div>
      <div style="font-size:11px;color:var(--subtext);margin-top:6px;">読み取れない場合はこのコードを手入力</div>
    </div>
    <div style="margin-top:20px;">
      <button class="big-btn start" id="btn-continue">この内容で開始する</button>
    </div>
  `;
  if(typeof QRCode === 'undefined'){
    // QRコード生成ライブラリが読み込めなかった場合は、コード文字列のみで運用を継続できるようにする
    console.error("QRCodeライブラリが読み込まれていません");
    document.getElementById('qrcode').innerHTML = `<div style="padding:20px;color:var(--subtext);font-size:12px;">QR画像を生成できませんでした。下のコードを手入力してください。</div>`;
  }else{
    new QRCode(document.getElementById('qrcode'), {
      text: joinUrl,
      width: 200,
      height: 200,
      colorDark: "#15141a",
      colorLight: "#ffffff"
    });
  }

  document.getElementById('btn-continue').onclick = async ()=>{
    if(!db){ toast('Firebase設定が未入力です'); return; }
    try{
      await db.collection('hairmeSessions').doc(sessionId).set({
        createdAt: FieldValue.serverTimestamp(),
        menus: DEFAULT_MENUS
      });
      saveLocal('store', sessionId);
      state.role = 'store';
      state.sessionId = sessionId;
      renderStoreDashboard();
    }catch(e){
      console.error(e);
      toast('セッション作成に失敗しました: ' + (e && (e.code || e.message) || '不明なエラー'));
    }
  };
}

/* =========================================================
   画面：ヘアメ - 参加（QRスキャン or 手入力）
   ========================================================= */
let scanStream = null;
let scanRAF = null;

function renderHairmeJoin(){
  teardown();
  $app.innerHTML = `
    <div class="app-header">
      <h1>ヘアメ用 - 参加</h1>
    </div>
    <div class="join-box">
      <button id="btn-scan" style="width:100%;">カメラでQRを読み取る</button>
      <video id="scan-video" playsinline muted style="display:none;"></video>
      <div class="join-manual">
        <input id="manual-code" placeholder="コードを直接入力" maxlength="6">
        <button id="btn-manual-join">参加</button>
      </div>
    </div>
  `;

  document.getElementById('btn-scan').onclick = startScan;
  document.getElementById('btn-manual-join').onclick = ()=>{
    const code = document.getElementById('manual-code').value.trim().toUpperCase();
    if(code.length < 4){ toast('コードを入力してください'); return; }
    joinSession(code);
  };
}

async function startScan(){
  if(typeof jsQR === 'undefined'){
    toast('QR読み取り機能が利用できません。コードを直接入力してください');
    return;
  }
  const video = document.getElementById('scan-video');
  video.style.display = 'block';
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  try{
    scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = scanStream;
    await video.play();
  }catch(e){
    toast('カメラを起動できませんでした');
    return;
  }

  function tick(){
    if(video.readyState === video.HAVE_ENOUGH_DATA){
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height);
      if(code && code.data){
        stopScan();
        let val = code.data;
        try{
          const u = new URL(val);
          val = u.searchParams.get('join') || val;
        }catch(e){ /* 生のコード文字列の場合はそのまま */ }
        joinSession(val.toUpperCase());
        return;
      }
    }
    scanRAF = requestAnimationFrame(tick);
  }
  scanRAF = requestAnimationFrame(tick);
}
function stopScan(){
  if(scanRAF) cancelAnimationFrame(scanRAF);
  if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream = null; }
}

async function joinSession(sessionId){
  if(!db){ toast('Firebase設定が未入力です'); return; }
  try{
    const doc = await db.collection('hairmeSessions').doc(sessionId).get();
    if(!doc.exists){ toast('セッションが見つかりません'); return; }
    saveLocal('hairme', sessionId);
    state.role = 'hairme';
    state.sessionId = sessionId;
    renderHairmeDashboard();
  }catch(e){
    console.error(e);
    toast('参加に失敗しました: ' + (e && (e.code || e.message) || '不明なエラー'));
  }
}

/* =========================================================
   共通：Firestore購読
   ========================================================= */
function teardown(){
  stopScan();
  if(state.unsubQueue){ state.unsubQueue(); state.unsubQueue = null; }
  if(state.unsubSession){ state.unsubSession(); state.unsubSession = null; }
  if(state.tickTimer){ clearInterval(state.tickTimer); state.tickTimer = null; }
}

function subscribe(renderFn, tickFn){
  if(!db){ toast('Firebase設定が未入力です'); return; }
  teardown();
  state.unsubSession = db.collection('hairmeSessions').doc(state.sessionId)
    .onSnapshot(doc=>{
      const d = doc.data();
      state.menus = (d && d.menus && d.menus.length) ? d.menus : DEFAULT_MENUS;
    });
  state.unsubQueue = db.collection('hairmeSessions').doc(state.sessionId)
    .collection('queue').orderBy('order','asc')
    .onSnapshot(snap=>{
      state.queue = snap.docs.map(d=>({id:d.id, ...d.data()}));
      renderFn();
    }, err=>{
      console.error(err);
      toast('同期エラーが発生しました');
    });
  // 1秒ごとのtickは経過時間・待ち時間の表示だけを更新する（tickFn未指定時のみ全体再描画にフォールバック）。
  // renderFnを毎秒呼ぶと入力中のフォーム（キャスト名・分数など）がその都度リセットされてしまうため分離している。
  state.tickTimer = setInterval(tickFn || renderFn, 1000);
}

function resetSession(){
  if(!confirm('セッションを解除して役割選択に戻りますか？')) return;
  teardown();
  clearLocal();
  state = {role:null, sessionId:null, unsubQueue:null, unsubSession:null, menus:DEFAULT_MENUS, queue:[], tickTimer:null};
  renderRoleSelect();
}

/* =========================================================
   待ち時間計算
   ========================================================= */
function remainingMinutesFor(item){
  if(item.status !== 'in_progress') return item.estMinutes || 0;
  const startMs = tsToMs(item.startAt);
  if(!startMs) return item.estMinutes || 0;
  const elapsedMin = (nowMs() - startMs)/60000;
  return Math.max(0, (item.estMinutes||0) - elapsedMin);
}
function estimatedWaitFor(targetItem){
  let total = 0;
  for(const it of state.queue){
    if(it.order >= targetItem.order) continue;
    if(it.status === 'done') continue;
    total += remainingMinutesFor(it);
  }
  return total;
}

/* =========================================================
   画面：店舗ダッシュボード
   ========================================================= */
function renderStoreDashboard(){
  subscribe(drawStoreDashboard, updateStoreDashboardTimes);
  drawStoreDashboard();
}

// 全体を再描画せず、待ち時間・経過時間のテキストだけを毎秒更新する（入力欄の値を消さないため）
function updateStoreDashboardTimes(){
  const activeItems = state.queue.filter(q=>q.status!=='done').sort((a,b)=>a.order-b.order);
  activeItems.forEach(it=>{
    if(it.status === 'waiting'){
      const el = document.getElementById('wait-'+it.id);
      if(el) el.textContent = '予想待ち ' + fmtMin(estimatedWaitFor(it));
    }else if(it.status === 'in_progress'){
      const el = document.getElementById('elapsed-'+it.id);
      if(el){
        const startMs = tsToMs(it.startAt);
        el.textContent = startMs ? fmtClock(nowMs()-startMs) : '--:--';
      }
    }
  });
}

function drawStoreDashboard(){
  const waiting = state.queue.filter(q=>q.status==='waiting');
  const inProgress = state.queue.find(q=>q.status==='in_progress');
  const done = state.queue.filter(q=>q.status==='done');

  const menuOptions = state.menus.map(m=>`<option value="${m.name}" data-min="${m.minutes}">${m.name}（${m.minutes}分）</option>`).join('')
    + `<option value="__custom__">その他（自由入力）</option>`;

  $app.innerHTML = `
    <div class="app-header">
      <div>
        <h1>店舗用ダッシュボード</h1>
        <div class="session-code">コード: ${state.sessionId}</div>
      </div>
      <button class="link-reset" id="btn-reset">解除</button>
    </div>

    <div class="summary">
      <div class="card">
        <div class="num">${inProgress ? inProgress.name : '―'}</div>
        <div class="cap">ヘアメ施術中</div>
      </div>
      <div class="card">
        <div class="num">${waiting.length}</div>
        <div class="cap">待機人数</div>
      </div>
    </div>

    <div class="add-form">
      <div class="row">
        <input name="name" placeholder="キャスト名">
      </div>
      <div class="row">
        <select name="menu">${menuOptions}</select>
        <input name="minutes" type="number" min="1" placeholder="分" value="${state.menus[0]?.minutes||15}">
      </div>
      <div class="row">
        <button class="submit" id="btn-add">キューに追加</button>
      </div>
    </div>

    <div class="section-label">待ち・施術中</div>
    <div class="queue-list" id="active-list"></div>

    <details class="done-log">
      <summary>完了済み（${done.length}件）</summary>
      <div class="queue-list" id="done-list" style="margin-top:8px;"></div>
    </details>
  `;

  document.getElementById('btn-reset').onclick = resetSession;

  const menuSelect = $app.querySelector('select[name=menu]');
  const minutesInput = $app.querySelector('input[name=minutes]');
  menuSelect.onchange = ()=>{
    const opt = menuSelect.selectedOptions[0];
    if(opt.value !== '__custom__' && opt.dataset.min){
      minutesInput.value = opt.dataset.min;
    }
  };

  document.getElementById('btn-add').onclick = async ()=>{
    const nameInput = $app.querySelector('input[name=name]');
    const name = nameInput.value.trim();
    if(!name){ toast('キャスト名を入力してください'); return; }
    let menuName = menuSelect.value;
    if(menuName === '__custom__') menuName = '自由入力';
    const minutes = parseInt(minutesInput.value, 10) || 15;
    const maxOrder = state.queue.reduce((m,q)=>Math.max(m,q.order||0), 0);
    try{
      await db.collection('hairmeSessions').doc(state.sessionId).collection('queue').add({
        name, menu: menuName, estMinutes: minutes,
        order: maxOrder + 1,
        status: 'waiting',
        startAt: null, endAt: null, style: null,
        createdAt: FieldValue.serverTimestamp()
      });
      nameInput.value = '';
      toast(`${name}さんを追加しました`);
    }catch(e){
      console.error(e);
      toast('追加に失敗しました');
    }
  };

  const activeList = document.getElementById('active-list');
  const activeItems = state.queue.filter(q=>q.status!=='done').sort((a,b)=>a.order-b.order);
  if(activeItems.length === 0){
    activeList.innerHTML = `<div class="empty-hint">待機中のキャストはいません</div>`;
  }else{
    activeList.innerHTML = activeItems.map((it, idx)=>renderStoreItem(it, idx, activeItems)).join('');
    activeItems.forEach(it=>{
      const upBtn = document.getElementById('up-'+it.id);
      const downBtn = document.getElementById('down-'+it.id);
      const delBtn = document.getElementById('del-'+it.id);
      if(upBtn) upBtn.onclick = ()=>moveOrder(it, -1, activeItems);
      if(downBtn) downBtn.onclick = ()=>moveOrder(it, 1, activeItems);
      if(delBtn) delBtn.onclick = ()=>deleteItem(it);
    });
  }

  const doneList = document.getElementById('done-list');
  doneList.innerHTML = done.length
    ? done.slice().reverse().map(renderDoneItem).join('')
    : `<div class="empty-hint">完了記録はまだありません</div>`;
}

function renderStoreItem(it, idx, arr){
  let meta = '';
  if(it.status === 'waiting'){
    const wait = estimatedWaitFor(it);
    meta = `<span><span class="status-dot waiting"></span>待機中</span><span id="wait-${it.id}">予想待ち ${fmtMin(wait)}</span><span>${it.menu} / ${it.estMinutes}分</span>`;
  }else if(it.status === 'in_progress'){
    const startMs = tsToMs(it.startAt);
    const elapsed = startMs ? fmtClock(nowMs()-startMs) : '--:--';
    meta = `<span><span class="status-dot in_progress"></span>施術中</span><span class="elapsed" id="elapsed-${it.id}">${elapsed}</span><span>${it.menu} / 予定${it.estMinutes}分</span>`;
  }
  const isWaiting = it.status === 'waiting';
  const canDelete = it.status !== 'in_progress';
  return `
    <div class="q-item status-${it.status}">
      <div class="pos">${idx+1}</div>
      <div class="info">
        <div class="name">${escapeHtml(it.name)}</div>
        <div class="meta">${meta}</div>
      </div>
      <div class="ctrl">
        ${isWaiting ? `<button id="up-${it.id}" title="上へ">▲</button><button id="down-${it.id}" title="下へ">▼</button>` : ''}
        ${canDelete ? `<button id="del-${it.id}" class="danger" title="削除">×</button>` : ''}
      </div>
    </div>
  `;
}

function renderDoneItem(it){
  const s = tsToMs(it.startAt), e = tsToMs(it.endAt);
  const actual = (s && e) ? fmtMin((e-s)/60000) : '-';
  const styleLabel = it.style === 'up' ? 'アップ' : it.style === 'down' ? 'ダウン' : '-';
  return `
    <div class="q-item status-done">
      <div class="info">
        <div class="name">${escapeHtml(it.name)}</div>
        <div class="meta">
          <span><span class="status-dot done"></span>完了</span>
          <span>${it.menu}</span>
          <span>実施 ${actual}</span>
          <span>髪型: ${styleLabel}</span>
        </div>
      </div>
    </div>
  `;
}

async function moveOrder(item, dir, activeItems){
  const idx = activeItems.findIndex(x=>x.id===item.id);
  const swapIdx = idx + dir;
  if(swapIdx < 0 || swapIdx >= activeItems.length) return;
  const other = activeItems[swapIdx];
  if(other.status !== 'waiting') return; // 施術中/完了とは入れ替えない
  const batch = db.batch();
  const col = db.collection('hairmeSessions').doc(state.sessionId).collection('queue');
  batch.update(col.doc(item.id), {order: other.order});
  batch.update(col.doc(other.id), {order: item.order});
  try{ await batch.commit(); }
  catch(e){ console.error(e); toast('並び替えに失敗しました'); }
}

async function deleteItem(item){
  if(!confirm(`${item.name}さんをキューから削除しますか？`)) return;
  try{
    await db.collection('hairmeSessions').doc(state.sessionId).collection('queue').doc(item.id).delete();
  }catch(e){ console.error(e); toast('削除に失敗しました'); }
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* =========================================================
   画面：ヘアメダッシュボード
   ========================================================= */
function renderHairmeDashboard(){
  subscribe(drawHairmeDashboard, updateHairmeDashboardTimes);
  drawHairmeDashboard();
}

// 全体を再描画せず、施術中の経過時間だけを毎秒更新する（メニュー編集フォームの入力値を消さないため）
function updateHairmeDashboardTimes(){
  const inProgress = state.queue.find(q=>q.status==='in_progress');
  if(!inProgress) return;
  const el = document.getElementById('cur-elapsed');
  if(el){
    const startMs = tsToMs(inProgress.startAt);
    el.textContent = startMs ? fmtClock(nowMs()-startMs) : '--:--';
  }
}

let hairmeEditOpen = false;

function drawHairmeDashboard(){
  const waiting = state.queue.filter(q=>q.status==='waiting').sort((a,b)=>a.order-b.order);
  const inProgress = state.queue.find(q=>q.status==='in_progress');
  const current = inProgress || waiting[0] || null;
  const upcoming = inProgress ? waiting : waiting.slice(1);

  const menuOptions = state.menus.map(m=>`<option value="${m.name}" data-min="${m.minutes}">${m.name}</option>`).join('');

  let currentBlock = `<div class="empty-hint">待機中のキャストはいません</div>`;

  if(current){
    if(inProgress){
      const startMs = tsToMs(current.startAt);
      const elapsed = startMs ? fmtClock(nowMs()-startMs) : '--:--';
      currentBlock = `
        <div class="current-card">
          <div class="cur-name">${escapeHtml(current.name)}</div>
          <div class="cur-meta">${current.menu} / 予定${current.estMinutes}分・経過 <span class="elapsed" id="cur-elapsed">${elapsed}</span></div>
          <div class="finish-row">
            <button id="finish-up">アップ で終了</button>
            <button id="finish-down">ダウン で終了</button>
          </div>
        </div>
      `;
    }else{
      currentBlock = `
        <div class="current-card">
          <div class="cur-name">${escapeHtml(current.name)}</div>
          <div class="cur-meta" id="cur-meta-text">${current.menu} / ${current.estMinutes}分</div>
          <button class="edit-toggle" id="toggle-edit">${hairmeEditOpen ? '閉じる' : 'メニュー・時間を修正'}</button>
          ${hairmeEditOpen ? `
            <div class="edit-row">
              <select id="edit-menu">${menuOptions}</select>
              <input id="edit-minutes" type="number" min="1" value="${current.estMinutes}">
            </div>
          ` : ''}
          <button class="big-btn start" id="btn-start">スタート</button>
        </div>
      `;
    }
  }

  $app.innerHTML = `
    <div class="app-header">
      <div>
        <h1>ヘアメ用</h1>
        <div class="session-code">コード: ${state.sessionId}</div>
      </div>
      <button class="link-reset" id="btn-reset">解除</button>
    </div>

    <div class="summary">
      <div class="card">
        <div class="num">${waiting.length}</div>
        <div class="cap">待機人数</div>
      </div>
      <div class="card">
        <div class="num">${inProgress ? '施術中' : '空き'}</div>
        <div class="cap">現在の状態</div>
      </div>
    </div>

    ${currentBlock}

    <div class="section-label">次に呼ぶキャスト</div>
    <div class="next-list">
      ${upcoming.length ? upcoming.map((it,i)=>`<div class="n-row"><span><b>${i+1}.</b> ${escapeHtml(it.name)}</span><span>${it.menu} / ${it.estMinutes}分</span></div>`).join('') : `<div class="empty-hint">なし</div>`}
    </div>
  `;

  document.getElementById('btn-reset').onclick = resetSession;

  if(current && !inProgress){
    const toggleBtn = document.getElementById('toggle-edit');
    if(toggleBtn) toggleBtn.onclick = ()=>{ hairmeEditOpen = !hairmeEditOpen; drawHairmeDashboard(); };

    document.getElementById('btn-start').onclick = async ()=>{
      let menu = current.menu, minutes = current.estMinutes;
      if(hairmeEditOpen){
        menu = document.getElementById('edit-menu').value;
        minutes = parseInt(document.getElementById('edit-minutes').value,10) || current.estMinutes;
      }
      try{
        await db.collection('hairmeSessions').doc(state.sessionId).collection('queue').doc(current.id).update({
          status: 'in_progress',
          menu, estMinutes: minutes,
          startAt: FieldValue.serverTimestamp()
        });
        hairmeEditOpen = false;
      }catch(e){ console.error(e); toast('開始に失敗しました'); }
    };
  }

  if(inProgress){
    document.getElementById('finish-up').onclick = ()=>finishCurrent(inProgress, 'up');
    document.getElementById('finish-down').onclick = ()=>finishCurrent(inProgress, 'down');
  }
}

async function finishCurrent(item, style){
  try{
    await db.collection('hairmeSessions').doc(state.sessionId).collection('queue').doc(item.id).update({
      status: 'done',
      style,
      endAt: FieldValue.serverTimestamp()
    });
    toast('終了を記録しました');
  }catch(e){ console.error(e); toast('終了処理に失敗しました'); }
}

/* =========================================================
   起動
   ========================================================= */
boot();
</script>
