<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ヘアメ待ち管理</title>

<!--
  ============================================================
  デプロイ手順（mto-shizuokaと同様の構成を想定）
  1) このアプリ専用のFirebaseプロジェクトを新規作成
     （既存のmto-shizuokaと混在させない場合は新規推奨。同一プロジェクトに
      別コレクション名で同居させる場合はfirebaseConfigを既存のものに差し替えでも可）
  2) Firestore を作成（本番モード）
  3) 下記 firebaseConfig に値を入力
  4) Firestoreルール例（sessionコードを知っている端末のみ読み書き可・簡易版）
     rules_version = '2';
     service cloud.firestore {
       match /databases/{database}/documents {
         match /hairmeSessions/{sessionId} {
           allow read, write: if true;
           match /queue/{docId} {
             allow read, write: if true;
           }
         }
       }
     }
     ※社内限定運用前提の簡易ルール。公開運用する場合は要検討。
  5) firebase deploy (Hosting) でこの1ファイルを配信
  ============================================================
-->

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-app-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF;
    --bg-soft:#F6F5F9;
    --surface:#FFFFFF;
    --line:#DEDEDE;
    --ink:#111111;
    --ink-soft:#555555;
    --accent:#FF2C63;
    --accent-2:#6E56CF;
    --accent-soft:#FFDCE5;
    --accent-tint:#FFF7F9;
    --wait-bg:#E8E8E8;
    --wait-ink:#555555;
    --progress:#FF2C63;
    --done:#35A854;
    --done-soft:#E3F6E8;
    --danger:#E5484D;
    --danger-soft:#FDE8E8;
    --shadow-card:0 3px 10px rgba(0,0,0,.03);
    --shadow-hero:0 10px 30px rgba(23,16,30,.08);
    --radius-lg:18px;
    --radius-md:14px;
    --radius-sm:12px;
    --font-display:"Zen Maru Gothic","Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
    --font-body:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-tap-highlight-color:transparent;
    overflow-x:hidden;
    width:100%;
  }
  body{min-height:100vh;}
  button{
    font-family:inherit;
    cursor:pointer;
    border:1px solid var(--line);
    color:var(--ink);
    background:var(--surface);
    border-radius:999px;
    padding:13px 18px;
    font-size:14.5px;
    font-weight:700;
    transition:opacity .15s ease, transform .05s ease, box-shadow .15s ease;
  }
  button:active{transform:scale(0.96);}
  button:disabled{opacity:.35;cursor:not-allowed;}
  input,select{
    font-family:inherit;
    font-size:14.5px;
    background:var(--bg-soft);
    border:1px solid transparent;
    color:var(--ink);
    border-radius:var(--radius-sm);
    padding:12px 14px;
  }
  input::placeholder{color:var(--ink-soft);}
  input:focus,select:focus,button:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:1px;
  }

  .screen{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    padding:26px 18px 70px;
  }

  /* ---- 店舗/ヘアメ ダッシュボード：1画面に収めて一覧のみスクロール ---- */
  body.app-fixed{
    height:100dvh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  body.app-fixed #app.screen{
    flex:1 1 auto;
    min-height:0;
    display:flex;
    flex-direction:column;
    padding:14px 14px 12px;
    overflow:hidden;
  }
  body.app-fixed .store-panel{
    flex:1 1 auto;
    min-height:0;
    display:flex;
    flex-direction:column;
  }
  body.app-fixed .store-section{
    flex-shrink:0;
  }
  body.app-fixed .store-section.scroll-area{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }

  /* ---- 役割選択 ---- */
  .eyebrow{
    display:inline-block;
    font-size:11px;
    font-weight:700;
    color:var(--accent);
    background:var(--accent-soft);
    letter-spacing:.14em;
    text-transform:uppercase;
    padding:5px 12px;
    border-radius:999px;
    margin-bottom:12px;
  }
  .role-select-wrap{
    text-align:center;
    padding-top:18px;
  }
  .role-sparkle{
    color:var(--accent);
    font-size:22px;
    line-height:1;
    margin-bottom:14px;
  }
  .role-select-wrap h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:32px;
    margin:0 0 18px;
    letter-spacing:.02em;
  }
  .role-subtitle-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin-bottom:40px;
  }
  .role-subtitle-row .dash{
    flex:0 0 34px;
    height:1px;
    background:var(--accent);
    opacity:.45;
  }
  .role-subtitle-row .txt{
    font-size:13px;
    font-weight:700;
    color:var(--accent);
    letter-spacing:.04em;
    white-space:nowrap;
  }
  .role-card-row{
    display:flex;
    align-items:center;
    gap:18px;
    width:100%;
    background:var(--surface);
    border:1.5px solid var(--line);
    border-radius:24px;
    box-shadow:var(--shadow-card);
    padding:18px 20px;
    text-align:left;
  }
  .role-card-row + .role-card-row{margin-top:18px;}
  .role-card-row.store{border-color:#F6C7D2;}
  .role-card-row.hairme{border-color:#D6CDF0;}
  .role-icon-circle{
    width:68px;height:68px;
    border-radius:50%;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .role-icon-circle svg{width:32px;height:32px;stroke:currentColor;}
  .role-card-row.store .role-icon-circle{background:var(--accent-soft);color:var(--accent);}
  .role-card-row.hairme .role-icon-circle{background:#ECE8FA;color:var(--accent-2);}
  .role-card-label{
    flex:1;
    min-width:0;
    font-family:var(--font-display);
    font-weight:700;
    font-size:19px;
  }
  .role-chevron{flex-shrink:0;display:flex;}
  .role-chevron svg{width:22px;height:22px;stroke-width:2.5;}
  .role-card-row.store .role-chevron{color:var(--accent);}
  .role-card-row.hairme .role-chevron{color:var(--accent-2);}
  .role-footer{
    margin-top:64px;
    text-align:center;
  }
  .role-footer-brand-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin-bottom:6px;
  }
  .role-footer-brand-row .dash{
    flex:0 0 34px;
    height:1px;
    background:var(--accent);
    opacity:.4;
  }
  .role-footer-brand{
    font-size:12px;
    font-weight:700;
    color:var(--accent);
    letter-spacing:.14em;
  }
  .role-footer-caption{
    font-size:10px;
    color:var(--ink-soft);
    letter-spacing:.16em;
  }

  /* ---- 共通ヘッダー ---- */
  .app-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:20px;
  }
  .app-header h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:19px;
    margin:0;
    letter-spacing:.01em;
  }
  .session-code{
    display:inline-block;
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:.04em;
    margin-top:4px;
    background:var(--bg-soft);
    padding:3px 10px;
    border-radius:999px;
  }
  .hairme-badge{
    display:inline-block;
    font-size:11px;
    color:var(--accent);
    letter-spacing:.02em;
    margin-top:4px;
    margin-left:6px;
    background:var(--accent-soft);
    padding:3px 10px;
    border-radius:999px;
    font-weight:700;
  }
  .header-actions{
    display:flex;
    align-items:center;
    gap:4px;
    flex-shrink:0;
  }
  .icon-btn{
    width:40px;height:40px;
    border-radius:50%;
    padding:0;
    display:flex;align-items:center;justify-content:center;
    background:var(--bg-soft);
    border:none;
    font-size:18px;
    color:var(--ink-soft);
  }
  .icon-btn svg{width:19px;height:19px;display:block;stroke:currentColor;}
  .icon-btn.reset{color:var(--danger);background:var(--danger-soft);}
  .link-reset{
    background:none;
    border:none;
    color:var(--ink-soft);
    text-decoration:underline;
    text-underline-offset:2px;
    font-size:12px;
    font-weight:400;
    padding:4px;
  }
  .link-small{
    background:none;
    border:none;
    color:var(--accent);
    font-size:11.5px;
    font-weight:700;
    padding:2px 4px;
  }

  /* ---- QRモーダル ---- */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(23,16,30,.5);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:80;
  }
  .modal-card{
    width:100%;
    max-width:340px;
    background:var(--surface);
    border-radius:var(--radius-lg);
    padding:24px 22px;
    text-align:center;
    box-shadow:var(--shadow-hero);
  }
  .modal-card h2{
    font-family:var(--font-display);
    font-size:17px;
    margin:0 0 4px;
  }
  .modal-card .sub{
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:4px;
  }
  .modal-close{
    width:100%;
    margin-top:18px;
    background:var(--ink);
    border-color:var(--ink);
    color:#fff;
    padding:14px;
  }
  .chip.assigned{background:var(--bg-soft);color:var(--ink);font-weight:700;}
  .other-progress{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:22px;
  }
  .other-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12.5px;
    color:var(--ink-soft);
    padding:11px 14px;
    background:var(--bg-soft);
    border-radius:var(--radius-sm);
  }
  .other-row b{color:var(--ink);}
  .name-field-box{
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:var(--shadow-card);
    border-radius:var(--radius-lg);
    padding:20px;
    margin-bottom:16px;
  }
  .name-field-box label{
    display:block;
    font-size:12px;
    font-weight:700;
    color:var(--ink-soft);
    margin-bottom:8px;
  }
  .name-field-box input{width:100%;}
  .name-field-hint{
    font-size:11px;
    color:var(--ink-soft);
    margin-top:8px;
  }

  /* ---- ペアリング(店舗) ---- */
  .qr-box{
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:var(--shadow-card);
    border-radius:var(--radius-lg);
    padding:28px 24px;
    text-align:center;
  }
  .qr-box #qrcode{
    display:inline-block;
    background:#fff;
    padding:14px;
    border-radius:var(--radius-md);
    box-shadow:var(--shadow-card);
    margin:16px 0;
  }
  .qr-code-text{
    font-family:var(--font-display);
    font-size:28px;
    letter-spacing:.16em;
    font-weight:700;
    color:var(--accent);
  }

  /* ---- ペアリング(ヘアメ) ---- */
  .join-box{
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:var(--shadow-card);
    border-radius:var(--radius-lg);
    padding:22px;
  }
  #scan-video{
    width:100%;
    border-radius:var(--radius-md);
    background:#000;
    margin:12px 0;
  }
  .join-manual{
    display:flex;
    gap:8px;
    margin-top:14px;
    flex-wrap:wrap;
  }
  .join-manual input{flex:1 1 120px;min-width:0;text-transform:uppercase;border-radius:999px;}
  .join-manual button{flex-shrink:0;background:var(--ink);color:#fff;border-color:var(--ink);}

  /* ---- summary bar ---- */
  .summary{
    display:flex;
    gap:12px;
    margin-bottom:20px;
  }
  .summary .card{
    flex:1;
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:var(--shadow-card);
    border-radius:var(--radius-md);
    padding:16px 16px;
  }
  .summary .num{
    font-family:var(--font-display);
    font-size:24px;
    font-weight:700;
    color:var(--accent);
  }
  .summary .cap{
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:.03em;
    margin-top:4px;
  }

  /* ---- 店舗画面: ステータスカード ---- */
  .stat-card{
    flex:1;
    min-width:0;
    display:flex;
    align-items:center;
    gap:11px;
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:var(--shadow-card);
    border-radius:var(--radius-md);
    padding:13px 14px;
  }
  .stat-icon{
    width:40px;height:40px;
    border-radius:12px;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .stat-icon svg{width:21px;height:21px;stroke:currentColor;}
  .stat-info{min-width:0;flex:1;}
  .stat-value{
    font-family:var(--font-display);
    font-size:16px;
    font-weight:700;
    line-height:1.25;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .stat-card.wait .stat-value{font-size:22px;}
  .stat-label{
    font-size:10.5px;
    color:var(--ink-soft);
    margin-top:2px;
    letter-spacing:.02em;
  }
  .stat-card.free .stat-icon{background:var(--done-soft);color:var(--done);}
  .stat-card.free .stat-value{color:var(--done);}
  .stat-card.busy .stat-icon{background:var(--accent-soft);color:var(--accent);}
  .stat-card.busy .stat-value{color:var(--accent);}
  .stat-card.wait .stat-icon{background:#ECE8FA;color:var(--accent-2);}
  .stat-card.wait .stat-value{color:var(--accent-2);}

  /* ---- 追加フォーム(店舗) : 順番登録がメイン作業なので目立たせる ---- */
  .add-form{
    background:linear-gradient(155deg, #FFFFFF 0%, var(--accent-soft) 145%);
    border:1.5px solid var(--accent);
    box-shadow:0 12px 28px rgba(255,61,104,.18);
    border-radius:var(--radius-lg);
    padding:20px 18px;
    margin-bottom:26px;
  }
  .add-form-title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:15px;
    color:var(--accent);
    margin-bottom:13px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .add-form .row{
    display:flex;
    gap:8px;
    margin-bottom:12px;
  }
  .add-form .row:last-child{margin-bottom:0;}
  .add-form input[name=name]{
    flex:1;
    font-size:16px;
    padding:14px 15px;
    background:#fff;
    border:1px solid var(--line);
  }
  .add-form select{flex:1;}
  .add-form .submit{
    width:100%;
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
    font-weight:700;
    font-size:16px;
    padding:16px;
    box-shadow:0 6px 16px rgba(255,61,104,.32);
  }

  /* ---- キュー一覧 ---- */
  .section-label{
    font-size:11px;
    color:var(--ink-soft);
    font-weight:700;
    letter-spacing:.1em;
    text-transform:uppercase;
    margin:24px 0 12px;
  }
  .queue-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .q-item{
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:var(--shadow-card);
    border-radius:var(--radius-md);
    padding:13px 14px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .q-item.status-in_progress{
    border:1px solid var(--accent);
    background:linear-gradient(135deg, var(--accent-soft), #fff 60%);
  }
  .q-item .pos{
    font-family:var(--font-display);
    font-size:13px;
    font-weight:700;
    color:var(--ink-soft);
    width:22px;
    height:22px;
    border-radius:50%;
    background:var(--bg-soft);
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .pos-ring{
    width:28px;height:28px;border-radius:50%;
    flex-shrink:0;
    background:conic-gradient(var(--accent) calc(var(--pct,0)*1%), var(--line) 0);
    display:flex;align-items:center;justify-content:center;
  }
  .pos-ring .pos-ring-inner{
    width:21px;height:21px;border-radius:50%;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:700;color:var(--accent);
  }
  .q-item .info{flex:1;min-width:0;}
  .q-item .name{
    font-size:14.5px;
    font-weight:700;
  }
  .q-item .meta{
    font-size:11px;
    color:var(--ink-soft);
    margin-top:4px;
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    align-items:center;
  }
  .chip{
    display:inline-flex;
    align-items:center;
    gap:4px;
    font-size:10.5px;
    font-weight:700;
    padding:3px 9px;
    border-radius:999px;
  }
  .chip.waiting{background:var(--wait-bg);color:var(--wait-ink);}
  .chip.in_progress{background:var(--accent);color:#fff;}
  .chip.done{background:var(--done-soft);color:var(--done);}
  .chip.cancelled{background:var(--danger-soft);color:var(--danger);}
  .q-item .ctrl{
    display:flex;
    gap:4px;
    flex-shrink:0;
  }
  .q-item .ctrl button{
    padding:7px 10px;
    font-size:13px;
    background:var(--bg-soft);
    border:none;
  }
  .q-item .ctrl button.danger{color:var(--danger);background:var(--danger-soft);}

  .empty-hint{
    color:var(--ink-soft);
    font-size:12.5px;
    text-align:center;
    padding:28px 10px;
    background:var(--bg-soft);
    border-radius:var(--radius-md);
  }

  .name-cancelled{
    text-decoration:line-through;
    color:var(--ink-soft);
  }
  .q-item.status-cancelled{opacity:.65;box-shadow:none;}
  .note-text{
    font-style:italic;
    color:var(--ink-soft);
    width:100%;
  }

  /* ---- ヘアメ操作カード ---- */
  .current-card{
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:var(--shadow-hero);
    border-radius:var(--radius-lg);
    padding:24px;
    margin-bottom:22px;
  }
  .current-card .cur-head{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:18px;
  }
  .ring{
    width:60px;height:60px;border-radius:50%;flex-shrink:0;
    background:conic-gradient(var(--accent) calc(var(--pct,0)*1%), var(--line) 0);
    display:flex;align-items:center;justify-content:center;
  }
  .ring .ring-inner{
    width:48px;height:48px;border-radius:50%;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-size:18px;font-weight:700;
    color:var(--accent);
  }
  .current-card .cur-name{
    font-family:var(--font-display);
    font-size:21px;
    font-weight:700;
    margin-bottom:4px;
  }
  .current-card .cur-meta{
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .current-card .edit-toggle{
    font-size:12px;
    font-weight:700;
    color:var(--accent);
    background:var(--accent-soft);
    border:none;
    padding:5px 12px;
    margin-bottom:0;
  }
  .style-chosen-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size:13.5px;
    margin-bottom:12px;
  }
  .style-chosen-row b{font-family:var(--font-display);color:var(--accent);}
  .finish-note{
    width:100%;
    resize:vertical;

<script>
/* =========================================================
   Firebase 設定：ここに新規（または既存）プロジェクトの値を入れる
   ========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyBbnEuWfPLdMRmEg7ln5HF7okh4QDD6cMU",
  authDomain: "hair-9821d.firebaseapp.com",
  projectId: "hair-9821d",

  appId: "1:592601877982:web:c6c57204f53eb3b539a14f"
};

let db = null;
let FieldValue = null;
let usingDemoBackend = false;

/* ---- デモモード用：メモリ内の簡易Firestore互換モック ----
   firebaseConfigが未設定（プレースホルダーのまま）の場合はこちらを使う。
   実際のFirestoreへは一切保存されず、リロードするとデータは消える。 */
function createDemoFirestore(){
  const SERVER_TS = Symbol('serverTimestamp');
  const store = {};      // path -> data
  const listeners = {};  // key -> Set<fn>
  let counter = 1;

  function resolve(data){
    const out = {};
    for(const k in data){
      out[k] = (data[k] === SERVER_TS) ? { toMillis: (()=>{ const ms = Date.now(); return ()=>ms; })() } : data[k];
    }
    return out;
  }
  function notify(key){ (listeners[key]||new Set()).forEach(fn=>fn()); }
  function collectionKey(path){ return 'COL:'+path; }

  function docRef(path){
    const parentCol = path.split('/').slice(0,-1).join('/');
    return {
      id: path.split('/').pop(),
      async set(data){ store[path] = {...(store[path]||{}), ...resolve(data)}; notify(path); notify(collectionKey(parentCol)); },
      async update(data){ store[path] = {...(store[path]||{}), ...resolve(data)}; notify(path); notify(collectionKey(parentCol)); },
      async delete(){ delete store[path]; notify(path); notify(collectionKey(parentCol)); },
      async get(){ const d = store[path]; return { exists: !!d, id: path.split('/').pop(), data: ()=> d ? {...d} : undefined }; },
      onSnapshot(cb){
        listeners[path] = listeners[path] || new Set();
        const fire = ()=>{ const d = store[path]; cb({ data: ()=> d ? {...d} : undefined }); };
        listeners[path].add(fire); fire();
        return ()=>listeners[path].delete(fire);
      },
      collection(name){ return collectionRef(path+'/'+name); }
    };
  }
  function collectionRef(path){
    const depth = path.split('/').length;
    return {
      doc(id){ return docRef(path+'/'+(id || ('auto'+(counter++)))); },
      async add(data){ const id = 'auto'+(counter++); store[path+'/'+id] = resolve(data); notify(collectionKey(path)); return {id}; },
      orderBy(field, dir){
        return {
          onSnapshot(cb, errCb){
            const key = collectionKey(path);
            listeners[key] = listeners[key] || new Set();
            const fire = ()=>{
              const docs = Object.keys(store)
                .filter(p=>p.startsWith(path+'/') && p.split('/').length === depth+1)
                .map(p=>({id:p.split('/').pop(), data:()=>({...store[p]})}));
              docs.sort((a,b)=>{ const av=a.data()[field]||0, bv=b.data()[field]||0; return dir==='desc' ? bv-av : av-bv; });
              cb({docs});
            };
            listeners[key].add(fire); fire();
            return ()=>listeners[key].delete(fire);
          }
        };
      }
    };
  }
  return {
    collection(name){ return collectionRef(name); },
    batch(){
      const ops = [];
      return { update(ref,data){ ops.push(()=>ref.update(data)); }, async commit(){ for(const op of ops) await op(); } };
    },
    async runTransaction(updateFn){
      // デモモードは単一メモリ内なので簡易実装（本物のFirestoreのような競合検知はしない）
      const tx = {
        async get(ref){ return await ref.get(); },
        update(ref, data){ ref.update(data); }
      };
      return await updateFn(tx);
    },
    _SERVER_TS: SERVER_TS
  };
}

function isFirebaseConfigured(cfg){
  return !!(cfg && cfg.apiKey && cfg.projectId && cfg.apiKey !== '___' && cfg.projectId !== '___');
}

if(isFirebaseConfigured(firebaseConfig) && typeof firebase !== 'undefined'){
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    // モバイルのアプリ内ブラウザ/プロキシ環境などではWebChannelのストリーミング接続(gRPC-Web)が
    // 「transport errored」で失敗し続けることがあるため、long pollingへ自動フォールバックさせる。
    try{
      db.settings({ experimentalForceLongPolling: true, useFetchStreams: false, merge: true });
    }catch(settingsErr){
      console.warn("Firestore settings適用に失敗", settingsErr);
    }
    FieldValue = firebase.firestore.FieldValue;
  }catch(e){
    console.error("Firebase初期化エラー", e);
  }
}
if(!db){
  // firebaseConfigが未設定、またはFirebase初期化に失敗した場合はデモモードで動作させる
  usingDemoBackend = true;
  db = createDemoFirestore();
  FieldValue = { serverTimestamp: ()=> db._SERVER_TS };
  console.warn("Firebase未設定のため、デモモード（メモリ内モック）で動作しています。データは保存されません。");
  document.addEventListener('DOMContentLoaded', ()=>{
    const b = document.getElementById('demo-banner');

}

/* ---------------- ユーティリティ ---------------- */
const $app = document.getElementById('app');
const $toast = document.getElementById('toast');
function toast(msg){
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toast._t);

function genSessionId(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // 紛らわしい文字除外
  let s = '';
  for(let i=0;i<6;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function nowMs(){ return Date.now(); }
function tsToMs(ts){
  if(!ts) return null;
  if(typeof ts.toMillis === 'function') return ts.toMillis();
  return null;
}
function fmtMin(mins){
  mins = Math.max(0, Math.round(mins));
  if(mins < 1) return '1分未満';
  return mins + '分';
}
function fmtClock(ms){
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const ss = s%60;
  return String(m).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
}

const STORE_NAME = '綺薇';
// この店舗専用の固定セッションID。ランダム生成をやめ、常に同じFirestoreドキュメントを使うことで、
// 「解除」しても登録済みヘアメ・待機中/完了中のキャストが消えないようにする（削除は明示操作のみ）。
const STORE_SESSION_ID = 'KIRARA';

  return (roster||[]).find(r => normalizeCode(r.name) === n) || null;

/* ---------------- ローカル状態の保存 ---------------- */
const LS_KEY = 'hairme_role_session_v2';

  localStorage.setItem(LS_KEY, JSON.stringify({role, sessionId}));

/* ---------------- ヘアメ本人の名前（端末に記憶し、以後は自動判別） ---------------- */

let state = {

  unsubActive: null,

function boot(){
  const joinParam = getJoinParamFromUrl();

  if(joinParam){
    // QR/リンク経由の参加。セッションの存在とヘアメ登録名を確認したうえで参加する。
    history.replaceState(null, '', location.pathname);
    checkSessionAndProceed(joinParam.toUpperCase());
    return;
  }

  const local = loadLocal();
  if(local && local.role && local.sessionId){
    state.role = local.role;
    if(local.role === 'store'){
      // 過去バージョンでランダム生成されたコードが端末に残っていても、常に固定コードへ揃える。
      state.sessionId = STORE_SESSION_ID;
      if(local.sessionId !== STORE_SESSION_ID) saveLocal('store', STORE_SESSION_ID);
      if(db) ensureStoreSessionDoc(STORE_SESSION_ID).catch(e=>console.error('セッション準備に失敗', e));
      renderStoreDashboard();
    }else{
      state.sessionId = local.sessionId;
      state.hairmeName = loadHairmeName();
      if(!state.hairmeName){ renderHairmeNamePrompt(local.sessionId); return; }
      renderHairmeDashboard();
    }
    return;
  }

  renderRoleSelect();
}

// セッションコードが有効か確認し、記憶済みの名前があれば自動参加、なければ名前入力へ進む
async function checkSessionAndProceed(sessionId){
  if(!db){ toast('Firebase設定が未入力です'); return; }
  try{
    const doc = await db.collection('hairmeSessions').doc(sessionId).get();
    if(!doc.exists){ toast('セッションが見つかりません'); renderHairmeJoin(); return; }
    const savedName = loadHairmeName();
    if(savedName){
      const ok = await joinSession(sessionId, savedName);
      if(ok) return;
    }
    renderHairmeNamePrompt(sessionId);
  }catch(e){
    console.error(e);
    toast('参加に失敗しました: ' + (e && (e.code || e.message) || '不明なエラー'));
  }
}

function renderRoleSelect(){

// QRコードを指定要素に描画する共通ヘルパー（セットアップ画面・モーダルの両方から使用）
function renderQrInto(elId, sessionId){
  const el = document.getElementById(elId);
  if(!el) return;
  const joinUrl = `${location.origin}${location.pathname}?join=${sessionId}`;
  try{
    if(typeof QRCode === 'undefined'){
      throw new Error('QRCode library not loaded');
    }
    el.innerHTML = '';
    new QRCode(el, {
      text: joinUrl,
      width: 200,
      height: 200,
      colorDark: "#17161b",
      colorLight: "#ffffff"
    });
  }catch(e){
    console.error("QR描画に失敗しました", e);
    el.innerHTML = `<div style="padding:20px;color:var(--ink-soft);font-size:12px;">QR画像を生成できませんでした。下のコードを手入力してください。</div>`;
  }
}

async function ensureStoreSessionDoc(sessionId){
  const ref = db.collection('hairmeSessions').doc(sessionId);
  const doc = await ref.get();
  if(!doc.exists){
    // 初回のみ作成。既にデータがある場合は絶対に上書きしない（ロースター・待機列を保護）。
    await ref.set({ createdAt: FieldValue.serverTimestamp(), hairmeRoster: [], shiftOpen: false });
  }
  return ref;
}

function drawHairmeShiftStartModal(roster){
  const slot = document.getElementById('qr-modal-slot');
  if(!slot) return;
  slot.innerHTML = `
    <div class="modal-overlay" id="shift-modal-overlay">
      <div class="modal-card" style="text-align:left;max-height:80vh;overflow-y:auto;">
        <h2 style="text-align:center;">今日出るヘアメ</h2>

        <div class="queue-list" id="shift-roster-list" style="margin-top:14px;">
          ${roster.map(r=>{
            const pos = shiftPickOrder.indexOf(r.id);
            const picked = pos >= 0;
            return `
            <div class="q-item" id="pick-${r.id}" style="cursor:pointer;${picked ? 'border-color:var(--accent);background:var(--accent-tint);' : ''}">
              <div class="pos">${picked ? (pos+1) : ''}</div>

          }).join('')}

        <button class="big-btn start" id="btn-shift-confirm" style="margin-top:16px;" ${shiftPickOrder.length ? '' : 'disabled'}>この${shiftPickOrder.length}名で開始する</button>
        <button class="modal-close" id="btn-shift-cancel">キャンセル</button>
      </div>
    </div>
  `;
  const overlay = document.getElementById('shift-modal-overlay');
  overlay.onclick = (e)=>{ if(e.target === overlay) slot.innerHTML = ''; };
  document.getElementById('btn-shift-cancel').onclick = ()=>{ slot.innerHTML = ''; };
  roster.forEach(r=>{
    document.getElementById('pick-'+r.id).onclick = ()=>{
      const idx = shiftPickOrder.indexOf(r.id);
      if(idx >= 0) shiftPickOrder.splice(idx, 1);
      else shiftPickOrder.push(r.id);
      drawHairmeShiftStartModal(roster);
    };
  });
  const confirmBtn = document.getElementById('btn-shift-confirm');
  if(confirmBtn && shiftPickOrder.length){
    confirmBtn.onclick = ()=>startHairmeShift(roster);
  }
}

async function startHairmeShift(roster){
  const chosen = shiftPickOrder.map(id=>roster.find(r=>r.id===id)).filter(Boolean);
  if(!chosen.length) return;
  try{
    const sessionRef = db.collection('hairmeSessions').doc(state.sessionId);
    const activeCol = sessionRef.collection('activeHairme');
    // 前回分が残っていれば消してから登録する
    const existing = await activeCol.get();
    const batch = db.batch();
    existing.docs.forEach(d=>batch.delete(d.ref));
    chosen.forEach((r, i)=>{
      const ref = activeCol.doc();
      batch.set(ref, {
        name: r.name,
        order: i,
        workStatus: 'pending',
        joinedAt: FieldValue.serverTimestamp(),
        startedAt: null
      });
    });
    batch.update(sessionRef, {shiftOpen: true});
    await batch.commit();
    const slot = document.getElementById('qr-modal-slot');
    if(slot) slot.innerHTML = '';
    toast('ヘアメ開始しました');
  }catch(e){
    console.error(e);
    toast('開始処理に失敗しました');
  }
}

async function endHairmeShift(){
  const remaining = state.queue.filter(q=>q.status==='waiting' || q.status==='in_progress').length;
  if(remaining > 0){
    if(!confirm(`まだ${remaining}名残っています。終了しますか？`)) return;
  }else{
    if(!confirm('ヘアメを終了しますか？')) return;
  }
  try{
    const sessionRef = db.collection('hairmeSessions').doc(state.sessionId);
    const queueCol = sessionRef.collection('queue');
    const activeCol = sessionRef.collection('activeHairme');
    const historyCol = sessionRef.collection('history');
    const [queueSnap, activeSnap] = await Promise.all([queueCol.get(), activeCol.get()]);

    const batch = db.batch();
    queueSnap.docs.forEach(d=>{
      const it = d.data();
      let archiveStatus = it.status;
      if(it.status === 'waiting' || it.status === 'in_progress') archiveStatus = 'force_ended';
      const histRef = historyCol.doc();
      batch.set(histRef, {
        hairmeCode: it.hairmeCode || null,
        name: it.name || null,
        estMinutes: it.estMinutes || null,
        status: archiveStatus,
        startAt: it.startAt || null,
        endAt: it.endAt || FieldValue.serverTimestamp(),
        note: it.note || null,
        archivedAt: FieldValue.serverTimestamp()
      });
      batch.delete(d.ref);
    });
    activeSnap.docs.forEach(d=>batch.delete(d.ref));
    batch.update(sessionRef, {shiftOpen: false});
    await batch.commit();
    toast('ヘアメを終了しました');
  }catch(e){
    console.error(e);
    toast('終了処理に失敗しました');
  }
}

async function renderStoreHistory(){
  teardown();
  $app.innerHTML = `
    <div class="app-header">
      <h1>対応履歴（直近1ヶ月）</h1>
      <button class="link-reset" id="btn-back">戻る</button>
    </div>
    <div class="empty-hint">読み込み中…</div>
  `;
  document.getElementById('btn-back').onclick = renderStoreDashboard;
  let rows = [];
  try{
    const cutoff = new Date(Date.now() - 30*24*60*60*1000);
    const snap = await db.collection('hairmeSessions').doc(state.sessionId)
      .collection('history')
      .where('archivedAt', '>=', cutoff)
      .orderBy('archivedAt', 'desc')
      .get();
    rows = snap.docs.map(d=>({id:d.id, ...d.data()}));
  }catch(e){
    console.error(e);
    toast('履歴の読み込みに失敗しました（初回は索引作成が必要な場合があります）');
  }
  drawStoreHistory(rows);
}

function drawStoreHistory(rows){
  const byHairme = {};
  rows.forEach(r=>{
    const key = r.hairmeCode || '(担当未設定)';
    if(!byHairme[key]) byHairme[key] = [];
    byHairme[key].push(r);
  });
  const names = Object.keys(byHairme).sort();

  const STATUS_LABEL = {done:'完了', cancelled:'キャンセル', force_ended:'強制終了'};
  const STATUS_CLASS = {done:'done', cancelled:'cancelled', force_ended:'cancelled'};

  $app.innerHTML = `
    <div class="app-header">
      <h1>対応履歴（直近1ヶ月）</h1>
      <button class="link-reset" id="btn-back">戻る</button>
    </div>
    ${names.length ? names.map(name=>`
      <div class="section-label">${escapeHtml(name)}（${byHairme[name].length}件）</div>
      <div class="queue-list" style="margin-bottom:20px;">
        ${byHairme[name].map(r=>{
          const s = tsToMs(r.startAt), e = tsToMs(r.endAt);
          const dateStr = e ? new Date(e).toLocaleString('ja-JP', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
          const actual = (s && e) ? fmtMin((e-s)/60000) : '-';
          return `
          <div class="q-item">
            <div class="info">
              <div class="name">${escapeHtml(r.name||'')}</div>
              <div class="meta">
                <span class="chip ${STATUS_CLASS[r.status]||'waiting'}">${STATUS_LABEL[r.status]||r.status}</span>
                <span>${escapeHtml(dateStr)}</span>
                ${r.status==='done' ? `<span>実施 ${actual}</span>` : ''}
              </div>
              ${r.note ? `<div class="meta note-text">メモ: ${escapeHtml(r.note)}</div>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    `).join('') : `<div class="empty-hint">直近1ヶ月の履歴はありません</div>`}
  `;
  document.getElementById('btn-back').onclick = renderStoreDashboard;
}

async function startScan(){
  if(typeof jsQR === 'undefined'){
    toast('QR読み取り機能が利用できません。コードを直接入力してください');
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    // http（非SSL）や古いWebViewではカメラAPI自体が存在しない
    toast('このページではカメラが使えません（https接続が必要です）。コードを直接入力してください');
    return;
  }
  const video = document.getElementById('scan-video');
  video.style.display = 'block';
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  try{
    scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = scanStream;
    await video.play();
  }catch(e){
    console.error('カメラ起動エラー', e);
    if(e && e.name === 'NotAllowedError'){
      toast('カメラの使用が許可されていません。ブラウザの設定を確認してください');
    }else if(e && e.name === 'NotFoundError'){
      toast('カメラが見つかりませんでした。コードを直接入力してください');
    }else{
      toast('カメラを起動できませんでした。コードを直接入力してください');
    }
    return;
  }

  function tick(){
    if(video.readyState === video.HAVE_ENOUGH_DATA){
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height);
      if(code && code.data){
        stopScan();
        let val = code.data;
        try{
          const u = new URL(val);
          val = u.searchParams.get('join') || val;
        }catch(e){ /* 生のコード文字列の場合はそのまま */ }
        checkSessionAndProceed(val.toUpperCase());
        return;
      }
    }
    scanRAF = requestAnimationFrame(tick);
  }
  scanRAF = requestAnimationFrame(tick);
}
function stopScan(){
  if(scanRAF) cancelAnimationFrame(scanRAF);
  if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream = null; }
}

// hairmeName が店舗登録済みの一覧（フルネーム）と一致する場合のみ参加させる。
// 一致すれば登録されている「フルネーム」を本人の識別名として採用する。
// 戻り値: 参加できたら true、できなければ false
async function joinSession(sessionId, hairmeName){
  if(!db){ toast('Firebase設定が未入力です'); return false; }
  if(!hairmeName || !hairmeName.trim()){ toast('あなたの名前を入力してください'); return false; }
  try{
    const doc = await db.collection('hairmeSessions').doc(sessionId).get();
    if(!doc.exists){ toast('セッションが見つかりません'); return false; }
    const d = doc.data() || {};
    const roster = d.hairmeRoster || [];
    const match = findRosterMatch(roster, hairmeName);
    if(!match){
      toast('登録されていない名前です。店舗にご確認ください');
      return false;
    }
    saveLocal('hairme', sessionId);
    saveHairmeName(match.name);
    state.role = 'hairme';
    state.sessionId = sessionId;
    state.hairmeName = match.name;
    renderHairmeDashboard();
    return true;
  }catch(e){
    console.error(e);
    toast('参加に失敗しました: ' + (e && (e.code || e.message) || '不明なエラー'));
    return false;
  }
}

/* =========================================================
   共通：Firestore購読
   ========================================================= */
function teardown(){
  document.body.classList.remove('app-fixed');
  stopScan();
  if(state.unsubQueue){ state.unsubQueue(); state.unsubQueue = null; }
  if(state.unsubSession){ state.unsubSession(); state.unsubSession = null; }
  if(state.unsubActive){ state.unsubActive(); state.unsubActive = null; }
  if(state.tickTimer){ clearInterval(state.tickTimer); state.tickTimer = null; }
}

function subscribe(renderFn, tickFn){
  if(!db){ toast('Firebase設定が未入力です'); return; }
  teardown();
  state.unsubSession = db.collection('hairmeSessions').doc(state.sessionId)
    .onSnapshot(doc=>{
      const d = doc.data();
      state.hairmeRoster = (d && d.hairmeRoster) || [];
      state.shiftOpen = !!(d && d.shiftOpen);
      renderFn();
    });
  state.unsubActive = db.collection('hairmeSessions').doc(state.sessionId)
    .collection('activeHairme').orderBy('order','asc')
    .onSnapshot(snap=>{
      state.activeHairme = snap.docs.map(d=>({id:d.id, ...d.data()}));
      renderFn();
    });
  state.unsubQueue = db.collection('hairmeSessions').doc(state.sessionId)
    .collection('queue').orderBy('order','asc')
    .onSnapshot(snap=>{
      state.queue = snap.docs.map(d=>({id:d.id, ...d.data()}));
      renderFn();
    }, err=>{
      console.error(err);
      toast('同期エラーが発生しました');
    });
  // 1秒ごとのtickは経過時間・待ち時間の表示だけを更新する（tickFn未指定時のみ全体再描画にフォールバック）。
  // renderFnを毎秒呼ぶと入力中のフォーム（キャスト名・分数など）がその都度リセットされてしまうため分離している。
  state.tickTimer = setInterval(tickFn || renderFn, 1000);
}

function resetSession(){
  if(!confirm('セッションを解除して役割選択に戻りますか？')) return;
  teardown();
  clearLocal();
  state = {role:null, sessionId:null, hairmeName:null, unsubQueue:null, unsubSession:null, unsubActive:null, hairmeRoster:[], queue:[], shiftOpen:false, activeHairme:[], tickTimer:null};
  renderRoleSelect();

/* =========================================================
   待ち時間計算
   ========================================================= */
function remainingMinutesFor(item){
  if(item.status !== 'in_progress') return item.estMinutes || 0;
  const startMs = tsToMs(item.startAt);
  if(!startMs) return item.estMinutes || 0;
  const elapsedMin = (nowMs() - startMs)/60000;
  return Math.max(0, (item.estMinutes||0) - elapsedMin);
}
function estimatedWaitFor(targetItem){
  let total = 0;
  for(const it of state.queue){
    if(it.order >= targetItem.order) continue;
    if(it.status === 'done' || it.status === 'cancelled') continue;
    total += remainingMinutesFor(it);
  }
  return total;
}

function progressPct(it){
  if(it.status !== 'in_progress') return 0;
  const startMs = tsToMs(it.startAt);
  if(!startMs || !it.estMinutes) return 0;
  const elapsedMin = (nowMs()-startMs)/60000;
  return Math.max(0, Math.min(100, (elapsedMin/it.estMinutes)*100));
}

function renderProgressCard(it){

function renderDoneItem(it){
  if(it.status === 'cancelled'){
    return `
      <div class="q-item status-cancelled">
        <div class="info">
          <div class="name name-cancelled">${escapeHtml(it.name)}</div>
          <div class="meta">
            <span class="chip cancelled">キャンセル</span>
          </div>
        </div>
      </div>
    `;
  }
  const s = tsToMs(it.startAt), e = tsToMs(it.endAt);
  const actual = (s && e) ? fmtMin((e-s)/60000) : '-';
  return `
    <div class="q-item status-done">
      <div class="info">
        <div class="name">${escapeHtml(it.name)}</div>
        <div class="meta">
          <span class="chip done">完了</span>
          <span>実施 ${actual}</span>
        </div>
        ${it.note ? `<div class="meta note-text">メモ: ${escapeHtml(it.note)}</div>` : ''}
      </div>
    </div>
  `;
}

async function moveOrder(item, dir, activeItems){
  const idx = activeItems.findIndex(x=>x.id===item.id);
  const swapIdx = idx + dir;
  if(swapIdx < 0 || swapIdx >= activeItems.length) return;
  const other = activeItems[swapIdx];
  if(other.status !== 'waiting') return; // 施術中/完了とは入れ替えない
  const batch = db.batch();
  const col = db.collection('hairmeSessions').doc(state.sessionId).collection('queue');
  batch.update(col.doc(item.id), {order: other.order});
  batch.update(col.doc(other.id), {order: item.order});
  try{ await batch.commit(); }
  catch(e){ console.error(e); toast('並び替えに失敗しました'); }
}

async function claimItem(item, hairmeName){
  const ref = db.collection('hairmeSessions').doc(state.sessionId).collection('queue').doc(item.id);
  try{
    await db.runTransaction(async tx=>{
      const doc = await tx.get(ref);
      const d = doc.data ? doc.data() : null;
      if(!d) throw new Error('not-found');
      if(d.status !== 'waiting') throw new Error('taken');
      tx.update(ref, {
        status: 'in_progress',
        startAt: FieldValue.serverTimestamp(),
        hairmeCode: hairmeName
      });
    });
  }catch(e){
    if(e && e.message === 'taken'){ toast('すでに他のヘアメが対応を開始しています'); }
    else{ console.error(e); toast('開始に失敗しました'); }
  }
}

async function cancelItem(item){
  if(!confirm(`${item.name}さんをキャンセルしますか？`)) return;
  try{
    await db.collection('hairmeSessions').doc(state.sessionId).collection('queue').doc(item.id).update({
      status: 'cancelled',
      endAt: FieldValue.serverTimestamp()
    });
  }catch(e){ console.error(e); toast('キャンセルに失敗しました'); }
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

    body = `
      <div class="current-card">
        <div class="cur-name">${escapeHtml(state.hairmeName||'')}さん、こんにちは</div>
        <div class="cur-meta" style="margin-bottom:16px;">準備ができたら「稼働開始」を押してください。押すまではキャストの対応を開始できません</div>
        <button class="big-btn start" id="btn-activate">稼働開始</button>
      </div>
    `;
  }
  $app.innerHTML = `
    <div class="store-panel">
      <div class="store-section store-header">
        <div class="store-name">ヘアメ用</div>
        <div class="store-code-block">
          <div class="store-code-label">セッションコード</div>
          <div class="store-code-box">${escapeHtml(state.sessionId)}</div>
        </div>
        <div class="store-header-icons">
          <button class="icon-action" id="btn-change-name" title="名前変更">${ICON_USER}<span>名前変更</span></button>
          <button class="icon-action reset" id="btn-reset" title="解除">${ICON_RESET}<span>解除</span></button>
        </div>
      </div>
      <div class="store-section">
        <div class="section-label">${title}</div>
        ${body}
      </div>
    </div>
  `;
  document.getElementById('btn-reset').onclick = resetSession;
  document.getElementById('btn-change-name').onclick = ()=>{
    if(!confirm('この端末に記憶された名前を消去し、名前を入力し直しますか？')) return;
    clearHairmeName();
    teardown();
    renderHairmeNamePrompt(state.sessionId);
  };
  if(kind === 'ready_to_activate'){
    document.getElementById('btn-activate').onclick = ()=>activateSelf(myActive);
  }
}

async function activateSelf(myActive){
  if(!myActive) return;
  try{
    await db.collection('hairmeSessions').doc(state.sessionId)
      .collection('activeHairme').doc(myActive.id)
      .update({workStatus:'working', startedAt: FieldValue.serverTimestamp()});
    toast('稼働開始しました');
  }catch(e){
    console.error(e);
    toast('稼働開始に失敗しました');
  }
}

function drawHairmeDashboard(){
  // 店舗が「ヘアメ開始」を押し、かつ自分がその日の参加者として選ばれ、
  // さらに自分自身が「稼働開始」を押すまでは通常の待ち行列画面を表示しない。
  if(!state.shiftOpen){
    drawHairmeStandbyScreen('before_open', null);
    return;
  }
  const myActive = state.activeHairme.find(a=>a.name===state.hairmeName);
  if(!myActive){
    drawHairmeStandbyScreen('not_selected', null);
    return;
  }
  if(myActive.workStatus !== 'working'){
    drawHairmeStandbyScreen('ready_to_activate', myActive);
    return;
  }

  const waiting = state.queue.filter(q=>q.status==='waiting').sort((a,b)=>a.order-b.order);
  // 自分が今対応しているキャスト（複数のヘアメが同じ列を共有するため、自分の担当だけを見る）
  const myInProgress = state.queue.find(q=>q.status==='in_progress' && q.hairmeCode===state.hairmeName);
  // 他のヘアメが対応中のキャスト（参考表示のみ）
  const othersInProgress = state.queue.filter(q=>q.status==='in_progress' && q.hairmeCode!==state.hairmeName);
  // 誰も担当していない先頭のキャスト＝自分がこれから呼べる候補
  const nextAvailable = myInProgress ? null : (waiting[0] || null);
  const inProgress = myInProgress; // 以下、既存ロジックとの互換用エイリアス
  const current = myInProgress || nextAvailable || null;
  const upcoming = myInProgress ? waiting : waiting.slice(1);

  let currentBlock = `<div class="empty-hint">待機中のキャストはいません</div>`;

  if(current){
    if(inProgress){
      if(finishDraft.itemId !== current.id){
        finishDraft = {itemId: current.id, note: ''};
      }
      const startMs = tsToMs(current.startAt);
      const elapsed = startMs ? fmtClock(nowMs()-startMs) : '--:--';
      const pct = progressPct(current);
      const initial = (current.name||'').trim().charAt(0) || '?';
      const finishArea = `
            <textarea id="finish-note" class="finish-note" placeholder="メモ（任意）" rows="2">${escapeHtml(finishDraft.note)}</textarea>
            <button class="big-btn start" id="btn-finish-complete">完了</button>
          `;
      currentBlock = `
        <div class="current-card">
          <div class="cur-head">
            <div class="ring" id="cur-ring" style="--pct:${pct}"><div class="ring-inner">${escapeHtml(initial)}</div></div>
            <div>
              <div class="cur-name">${escapeHtml(current.name)}</div>
              <div class="cur-meta">予定${current.estMinutes}分・経過 <span class="elapsed" id="cur-elapsed">${elapsed}</span></div>
            </div>
          </div>
          ${finishArea}
        </div>
      `;
    }else{
      currentBlock = `
        <div class="current-card">
          <div class="cur-name">${escapeHtml(current.name)}</div>
          <div class="cur-meta" id="cur-meta-text">目安${current.estMinutes}分</div>
          <button class="big-btn start" id="btn-start">スタート</button>
        </div>
      `;
    }
  }

  const othersBlock = othersInProgress.length ? `
    <div class="section-label">他のヘアメが対応中</div>
    <div class="other-progress">
      ${othersInProgress.map(it=>`<div class="other-row"><span><b>${escapeHtml(it.hairmeCode||'?')}</b> ・ ${escapeHtml(it.name)}</span><span>予定${it.estMinutes}分</span></div>`).join('')}
    </div>
  ` : '';

  const ICON_USER = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
  const ICON_RESET = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`;
  const ICON_CIRCLE = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>`;
  const ICON_USERS = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;

  document.body.classList.add('app-fixed');

  $app.innerHTML = `
    <div class="store-panel">
      <div class="store-section store-header">
        <div class="store-name">ヘアメ用</div>
        <div class="store-code-block">
          <div class="store-code-label">セッションコード</div>
          <div class="store-code-box">${escapeHtml(state.sessionId)}</div>
        </div>
        <div class="store-header-icons">
          <button class="icon-action" id="btn-change-name" title="名前変更">${ICON_USER}<span>名前変更</span></button>
          <button class="icon-action reset" id="btn-reset" title="解除">${ICON_RESET}<span>解除</span></button>
        </div>
      </div>

      <div class="store-section store-stats">
        <div class="info-card ${inProgress ? 'busy' : 'free'}">
          <div class="info-card-label">自分の状態</div>
          <div class="info-card-row">
            <div class="info-card-value ${inProgress ? 'busy' : 'free'}">${inProgress ? '施術中' : '空き'}</div>
            <div class="info-card-icon">${ICON_CIRCLE}</div>
          </div>
          <div class="info-card-caption">${escapeHtml(state.hairmeName||'')}</div>
        </div>
        <div class="info-card wait">
          <div class="info-card-label">待機人数</div>
          <div class="info-card-row">
            <div class="info-card-value wait">${waiting.length}<span class="unit">人</span></div>
            <div class="info-card-icon">${ICON_USERS}</div>
          </div>
          <div class="info-card-caption">待機中のキャスト</div>
        </div>
      </div>

      <div class="store-section">
        ${currentBlock}
        ${othersBlock}
      </div>

      <div class="store-section scroll-area">
        <div class="store-list-head">
          <div class="store-list-title">次に呼ぶキャスト</div>
        </div>
        <div class="next-list" style="margin-top:12px;">
          ${upcoming.length ? upcoming.map((it,i)=>`<div class="n-row"><span><b>${i+1}.</b> ${escapeHtml(it.name)}</span><span>${it.estMinutes}分</span></div>`).join('') : `<div class="empty-hint">なし</div>`}
        </div>
      </div>
    </div>
  `;

  document.getElementById('btn-reset').onclick = resetSession;
  document.getElementById('btn-change-name').onclick = ()=>{
    if(!confirm('この端末に記憶された名前を消去し、名前を入力し直しますか？')) return;
    clearHairmeName();
    teardown();
    renderHairmeNamePrompt(state.sessionId);
  };

  if(current && !inProgress){
    document.getElementById('btn-start').onclick = ()=>claimItem(current, state.hairmeName);
  }

  if(inProgress){
    const noteInput = document.getElementById('finish-note');
    noteInput.oninput = ()=>{ finishDraft.note = noteInput.value; };
    document.getElementById('btn-finish-complete').onclick = ()=>finishCurrent(inProgress, finishDraft.note);
  }
}

async function finishCurrent(item, note){
  try{
    await db.collection('hairmeSessions').doc(state.sessionId).collection('queue').doc(item.id).update({
      status: 'done',
      note: (note||'').trim() || null,
      endAt: FieldValue.serverTimestamp()
    });
    finishDraft = {itemId:null, note:''};
    toast('終了を記録しました');
  }catch(e){ console.error(e); toast('終了処理に失敗しました'); }
}

/* =========================================================
   起動
   ========================================================= */
boot();
</script>
</body>
</html>
